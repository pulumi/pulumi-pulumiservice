# API-surface acceptance tests — full e2e of every example × every language.
#
# Runs `go test -tags api -run TestApi ./examples` against the staging
# Pulumi backend. The TestApi suite creates real resources on the
# configured org (`service-provider-test-org`); the per-test cleanup
# hooks in pulumitest plus the prefix-based sweeper in
# examples/sweep_api_test.go keep the org tidy across runs.
#
# This workflow is *not* generated by ci-mgmt — keep edits here.
# Filename retained for CI history; jobs and test names target the api surface.

name: run-api-tests

on:
  pull_request:
    paths-ignore:
    - CHANGELOG.md
  workflow_dispatch:
  workflow_call:
  schedule:
    # Nightly catch-all in case PR runs are skipped (e.g. drafts).
    - cron: "0 4 * * *"

env:
  PROVIDER: pulumiservice
  PULUMI_API: https://api.pulumi-staging.io
  PULUMI_BACKEND_URL: https://api.pulumi-staging.io
  PULUMI_TEST_OWNER: service-provider-test-org
  PULUMI_TEST_USE_SERVICE: "true"
  PULUMI_GO_DEP_ROOT: ${{ github.workspace }}/..
  PULUMI_LOCAL_NUGET: ${{ github.workspace }}/nuget

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-tests:
    if: github.event_name != 'pull_request'
      || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - env:
          ESC_ACTION_ENVIRONMENT: github-secrets/${{ github.repository_owner }}-${{ github.event.repository.name }}
          ESC_ACTION_EXPORT_ENVIRONMENT_VARIABLES: "false"
          ESC_ACTION_OIDC_AUTH: "true"
          ESC_ACTION_OIDC_ORGANIZATION: pulumi
          ESC_ACTION_OIDC_REQUESTED_TOKEN_TYPE: urn:pulumi:token-type:access_token:organization
        id: esc-secrets
        name: Fetch secrets from ESC
        uses: pulumi/esc-action@9eb774255b1a4afb7855678ae8d4a77359da0d9b

      - name: Install mise
        uses: jdx/mise-action@590bfd78fa3e93efd2e7ea21d65d397118ac1430
        env:
          MISE_FETCH_REMOTE_VERSIONS_TIMEOUT: 30s
        with:
          version: 2026.3.7
          github_token: ${{ secrets.GITHUB_TOKEN }}
          cache: true

      - name: Install uv (python toolchain)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install maven (java toolchain)
        run: sudo apt-get update && sudo apt-get install -y maven

      - name: Build provider
        run: make provider

      - name: Build SDKs
        run: make build_sdks

      - name: Put locally-built provider on PATH
        run: echo "${GITHUB_WORKSPACE}/bin" >> "$GITHUB_PATH"

      - name: Register local nodejs SDK with yarn
        run: cd sdk/nodejs/bin && yarn link

      - name: Install Java SDK to local maven
        run: make build_java

      - name: Run API tests
        env:
          PULUMI_ACCESS_TOKEN: ${{ steps.esc-secrets.outputs.PULUMI_ACCESS_TOKEN_STAGING }}
        run: |
          cd examples
          go test -tags api -run TestApi -v -timeout 30m ./... \
            -count=1 -parallel 8

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-logs
          path: |
            /tmp/TestApi*/
            examples/*.log
          retention-days: 7
