# V2 acceptance tests — full e2e of every example × every language.
#
# Runs `go test -tags v2 -run TestV2 ./examples` against the staging
# Pulumi backend. The TestV2 suite creates real resources on the
# configured org (`service-provider-test-org`); the per-test cleanup
# hooks in pulumitest plus the prefix-based sweeper in
# examples/sweep_v2_test.go keep the org tidy across runs.
#
# This workflow is *not* generated by ci-mgmt — keep edits here.

name: run-v2-tests

on:
  pull_request:
    paths-ignore:
    - CHANGELOG.md
  workflow_dispatch:
  schedule:
    # Nightly catch-all in case PR runs are skipped (e.g. drafts).
    - cron: "0 4 * * *"

env:
  PROVIDER: pulumiservice
  PULUMI_API: https://api.pulumi-staging.io
  PULUMI_BACKEND_URL: https://api.pulumi-staging.io
  PULUMI_TEST_OWNER: service-provider-test-org
  PULUMI_TEST_USE_SERVICE: "true"
  PULUMI_GO_DEP_ROOT: ${{ github.workspace }}/..
  PULUMI_LOCAL_NUGET: ${{ github.workspace }}/nuget

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  v2-tests:
    if: github.event_name == 'workflow_dispatch'
      || github.event_name == 'schedule'
      || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pulumi/auth-with-esc@v0
        with:
          oidc-auth: true
          environment: pulumi/pulumiservice/pulumi-secrets

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Install uv (python toolchain)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install maven (java toolchain)
        run: sudo apt-get update && sudo apt-get install -y maven

      - name: Build provider
        run: make provider

      - name: Build SDKs
        run: make build_sdks

      - name: Register local nodejs SDK with yarn
        run: cd sdk/nodejs/bin && yarn link

      - name: Install Java SDK to local maven
        run: make build_java

      - name: Run V2 tests
        env:
          PULUMI_ACCESS_TOKEN: ${{ env.PULUMI_ACCESS_TOKEN }}
        run: |
          cd examples
          go test -tags v2 -run TestV2 -v -timeout 30m ./... \
            -count=1 -parallel 4

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: v2-test-logs
          path: |
            /tmp/TestV2*/
            examples/*.log
          retention-days: 7
