# API-surface acceptance tests — full e2e of every example × every language.
#
# Runs `go test -tags api -run TestApi ./examples` against the staging
# Pulumi backend. The TestApi suite creates real resources on the
# configured org (`service-provider-test-org`); the per-test cleanup
# hooks in pulumitest plus the prefix-based sweeper in
# examples/sweep_api_test.go keep the org tidy across runs.
#
# Sharded by language: each matrix entry builds only its own SDK and
# runs `TestApi/.*/<lang>`. The yaml lane drives the full E2E
# (up/refresh/destroy) on FullE2E cases; other lanes are preview-only.
#
# Not generated by ci-mgmt — the `pulumiservice-` filename prefix makes ci-mgmt
# skip it on regen. Self-triggers on release tags (see `on.push.tags`) so it
# runs at release time without being called from the generated release files.

name: run-api-tests

on:
  pull_request:
    paths-ignore:
    - CHANGELOG.md
  push:
    tags:
    # Stable (v1.2.3) and prerelease (v1.2.3-alpha.1) release tags.
    - v*.*.*
  workflow_dispatch:
  schedule:
    # Nightly catch-all in case PR runs are skipped (e.g. drafts).
    - cron: "0 4 * * *"

env:
  PROVIDER: pulumiservice
  PULUMI_API: https://api.pulumi-staging.io
  PULUMI_BACKEND_URL: https://api.pulumi-staging.io
  PULUMI_TEST_OWNER: service-provider-test-org
  PULUMI_TEST_USE_SERVICE: "true"
  PULUMI_GO_DEP_ROOT: ${{ github.workspace }}/..
  PULUMI_LOCAL_NUGET: ${{ github.workspace }}/nuget

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-tests:
    if: github.event_name != 'pull_request'
      || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        language: [yaml, typescript, python, go, csharp, java]
    steps:
      - uses: actions/checkout@v4

      - env:
          ESC_ACTION_ENVIRONMENT: github-secrets/${{ github.repository_owner }}-${{ github.event.repository.name }}
          ESC_ACTION_EXPORT_ENVIRONMENT_VARIABLES: "false"
          ESC_ACTION_OIDC_AUTH: "true"
          ESC_ACTION_OIDC_ORGANIZATION: pulumi
          ESC_ACTION_OIDC_REQUESTED_TOKEN_TYPE: urn:pulumi:token-type:access_token:organization
        id: esc-secrets
        name: Fetch secrets from ESC
        uses: pulumi/esc-action@9eb774255b1a4afb7855678ae8d4a77359da0d9b

      - name: Install mise
        uses: jdx/mise-action@590bfd78fa3e93efd2e7ea21d65d397118ac1430
        env:
          MISE_FETCH_REMOTE_VERSIONS_TIMEOUT: 30s
        with:
          version: 2026.3.7
          github_token: ${{ secrets.GITHUB_TOKEN }}
          cache: true

      - name: Install uv (python toolchain)
        if: matrix.language == 'python'
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install maven (java toolchain)
        if: matrix.language == 'java'
        run: sudo apt-get update && sudo apt-get install -y maven

      - name: Build provider
        run: make provider

      - name: Build language SDK
        run: |
          case "${{ matrix.language }}" in
            yaml)
              ;;  # yaml uses the in-process provider, no SDK needed
            typescript)
              make build_nodejs install_nodejs_sdk
              ;;
            python)
              make build_python
              ;;
            go)
              make build_go
              ;;
            csharp)
              make build_dotnet
              ;;
            java)
              make build_java
              ;;
          esac

      - name: Put locally-built provider on PATH
        run: echo "${GITHUB_WORKSPACE}/bin" >> "$GITHUB_PATH"

      - name: Run API tests
        env:
          PULUMI_ACCESS_TOKEN: ${{ steps.esc-secrets.outputs.PULUMI_ACCESS_TOKEN_STAGING }}
          # Only the yaml lane creates real resources (FullE2E up/refresh/destroy).
          # Other lanes are preview-only and must skip the sweeper, otherwise a
          # parallel shard's sweep can delete the team/webhook the yaml lane just
          # created and the follow-up PATCH 404s. See sweep_api_test.go.
          PULUMITEST_SKIP_SWEEP: ${{ matrix.language != 'yaml' && '1' || '' }}
        run: |
          cd examples
          go test -tags api -run "TestApi/.*/${{ matrix.language }}" -v -timeout 25m ./... \
            -count=1 -parallel 4

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-logs-${{ matrix.language }}
          path: |
            /tmp/TestApi*/
            examples/*.log
          retention-days: 7
