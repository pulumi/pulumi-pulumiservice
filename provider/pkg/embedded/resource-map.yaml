  # ─── Policy packs (org-registered) ──────────────────────────────────────
  # Note: publishing versions is a CLI/tooling operation, not a declarative
  # Pulumi program concern. The provider exposes the pack registration for
  # org-level policy groups to bind to; version publish lives in exclusions.

  orgs/policypacks:
    resources:
      PolicyPack:
        operations:
          create: CreatePolicyPack
          # GET for a pack version exists at a different path (GetPolicyPack);
          # for the pack-level resource we list and filter.
          readVia: { operationId: ListPolicyPacks_orgs, filterBy: name }
          delete: DeletePolicyPack_orgs_policypacks
        id:
          template: "{organizationName}/{name}"
          params: [organizationName, name]
        forceNew: [organizationName]
    functions:
      # Pack registry queries — config schema for a published pack version,
      # the org's view of a registry pack, and a list of available versions.
      getPolicyPackConfigSchema: { operationId: GetPolicyPackConfigSchema }
      getOrgRegistryPolicyPack:  { operationId: GetOrgRegistryPolicyPack }
      listPolicyPackVersions:    { operationId: ListPolicyPackVersions }

  # ─── Insights (preview) ─────────────────────────────────────────────────
  # `Account` manages a cloud-resource-scanning account under the insights
  # sub-module. Named just `Account` (not `InsightsAccount`) because the
  # module already provides the "insights" context — the spec's own
  # operationIds (CreateAccount/ReadAccount/…) and path segment confirm
  # the canonical noun is Account. Backed by the `/api/preview/insights/...`
  # endpoints; the API is preview and will stabilize alongside GA.
  orgs/insights:
    resources:
      Account:
        doc: |
          Insights account for cloud resource scanning and analysis across
          AWS, Azure, and GCP (preview). Associates a cloud provider
          configuration with an ESC environment, and optionally schedules
          recurring scans.
        operations:
          create: CreateAccount        # POST   /api/preview/insights/{orgName}/accounts/{accountName}
          read:   ReadAccount          # GET    /api/preview/insights/{orgName}/accounts/{accountName}
          update: UpdateAccount        # PATCH
          delete: DeleteAccount        # DELETE
        id:
          template: "{organizationName}/{accountName}"
          params: [organizationName, accountName]
        forceNew: [organizationName, accountName, provider]
        properties:
          organizationName:
            from: orgName
            type: string
            source: path
            required: true
            doc: Organization the insights account belongs to.
          accountName:
            type: string
            source: path
            required: true
            doc: Account name. Must be unique within the organization.
          provider:
            type: string
            source: body
            required: true
            enum: [aws, azure-native, gcp, kubernetes, oci]
            doc: Cloud provider being scanned.
          environment:
            type: string
            source: body
            required: true
            doc: ESC environment providing the provider credentials (format "<project>/<env>" or just "<env>" for default project).
          providerConfig:
            ref: "pulumi.json#/Any"
            source: body
            doc: Provider-specific configuration (region list, subscription IDs, GCP projects, etc.).
          scanSchedule:
            type: string
            source: body
            required: true
            enum: [none, "12h", daily]
            doc: How often to scan this account automatically. Set to "none" to disable scheduled scans (manual invoke via `triggerScan` still works).
          tags:
            type: object
            source: body
            additionalProperties: { type: string }
            doc: User-defined tags for filtering/grouping accounts.
          accountId:
            from: id
            type: string
            source: response
            output: true
            doc: Server-assigned account ID.
          scheduledScanEnabled:
            type: boolean
            source: response
            output: true
            doc: Whether scheduled scans are currently enabled for this account.
    functions:
      listAccounts: { operationId: ListAccounts }
    methods:
      # Trigger an ad-hoc scan of this account's cloud resources.
      Account.triggerScan:
        resource: orgs/insights:Account
        operationId: ScanAccount

  # ─── Approval rules ─────────────────────────────────────────────────────
  # NOTE: ApprovalRule in v1 likely maps to change-gates or change-requests in
  # the spec. The public spec exposes `change-gates` (Create/Read/Update/Delete
  # Gate) — TODO (task #7): confirm this is the v1 ApprovalRule equivalent
  # and map accordingly.

  changegates:
    resources:
      ApprovalRule:
        doc: |
          An approval rule gating deployments or environment changes. Requires
          one or more approvals from eligible approvers before a targeted
          action proceeds.
        operations:
          create: CreateGate                   # POST   /api/change-gates/{orgName}
          read:   ReadGate                     # GET    /api/change-gates/{orgName}/{gateID}
          update: UpdateGate                   # PUT
          delete: DeleteGate                   # DELETE
        id:
          template: "{organizationName}/{gateId}"
          params: [organizationName, gateId]
        forceNew: [organizationName]
        # Body shape per CreateChangeGateRequest:
        #   { name, enabled, target: {entityType, qualifiedName, actionTypes},
        #     rule: {ruleType: approval_required, ...} }
        # The nested `target`/`rule` blocks pass through as-is.
        properties:
          organizationName:
            from: orgName
            type: string
            source: path
            required: true
            doc: Organization that owns the rule.
          name:
            type: string
            source: body
            required: true
            doc: Human-readable name for the rule.
          enabled:
            type: boolean
            source: body
            required: true
            default: true
            doc: Whether the rule is active.
          target:
            ref: "pulumi.json#/Any"
            source: body
            required: true
            doc: |
              Target shape — `{entityType: "environment", qualifiedName: "<project>/<env>", actionTypes: ["update"|"open"]}`.
              Pulumi Cloud only supports environment targets in
              v2.0.0-alpha; richer targeting lands in a later release.
          rule:
            ref: "pulumi.json#/Any"
            source: body
            required: true
            doc: |
              Rule shape — `{ruleType: "approval_required", numApprovalsRequired: <n>,
              eligibleApprovers: {teams: [...]}, preventSelfApproval: <bool>}`.
          gateId:
            from: id
            pathName: gateID
            type: string
            source: response
            output: true
            doc: Server-assigned rule ID.
    functions:
      listApprovalRules: { operationId: ListGates }

  # ─── Pulumi Registry (read-only catalog) ────────────────────────────────
  # Public registry of Pulumi packages and project templates. Only functions
  # — Pulumi Cloud writes happen via package-publish CLI tooling.

  registry:
