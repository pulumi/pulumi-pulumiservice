# Pulumi Service Provider v2 — resource map
#
# Authoritative mapping from Pulumi Cloud OpenAPI operationIds to Pulumi
# resources, functions, and methods. Consumed by the `pulumi-gen-pulumiservice`
# generator alongside provider/spec/openapi_public.json.
#
# This is the single source of truth: if a pattern can't be expressed here,
# the schema is extended — we do NOT add a second file (no overlays).
#
# Status: v2.0 in-progress. The 20 resources the v1 hand-coded provider
# shipped are mapped below. Remaining operations are tracked in the
# coverage report; expansion to 100% coverage is tracked as a separate task.

modules:

  # ─── Organizations ──────────────────────────────────────────────────────

  orgs:
    resources:
      Organization:
        operations:
          read:   GetOrganization              # GET    /api/orgs/{orgName}
          update: UpdateOrganizationSettings   # PATCH  /api/orgs/{orgName}
        id:
          template: "{name}"
          params: [name]
        forceNew: [name]
        properties:
          name: { from: orgName, source: path }
    functions:
      # Org-wide deployment pause/resume — admin switches surfaced as
      # functions (not methods) because the Organization resource is
      # read-only and not emitted into SDKs.
      pauseOrgDeployments:  { operationId: PauseOrgDeployments }
      resumeOrgDeployments: { operationId: ResumeOrgDeployments }

  orgs/agents:
    resources:
      AgentPool:
        operations:
          create: CreateOrgAgentPool           # POST   /api/orgs/{orgName}/agent-pools
          read:   GetAgentPool                 # GET    /api/orgs/{orgName}/agent-pools/{poolId}
          update: PatchOrgAgentPool            # PATCH
          delete: DeleteOrgAgentPool           # DELETE
        id:
          template: "{organizationName}/{name}/{agentPoolId}"
          params: [organizationName, name, agentPoolId]
        forceNew: [organizationName]
        properties:
          organizationName: { from: orgName,   source: path }
          name:
            from: name
            source: body
            writeOnly: true
            doc: Agent pool display name. The Create response only echoes id+tokenValue, so we preserve `name` from inputs.
          description:
            from: description
            source: body
            writeOnly: true
            doc: User-provided description of the pool's purpose.
          tokenValue:  { from: tokenValue, source: response, secret: true, output: true }
          # The spec uses `id` in the request/response body but `{poolId}`
          # in the path — pathName bridges that.
          agentPoolId: { from: id, pathName: poolId, source: response, output: true }
    functions:
      listAgentPools: { operationId: ListOrgAgentPool }

  orgs/teams:
    resources:
      Team:
        # Spec exposes CreatePulumiTeam and CreateGitHubTeam as separate
        # operations. The provider collapses them into one resource
        # discriminated by `teamType` (matches v1 naming).
        doc: |
          The Pulumi Cloud offers role-based access control (RBAC) using teams.
          Teams allow organization admins to assign a set of stack permissions
          to a named group of users. A Pulumi team may be managed by Pulumi
          Cloud directly, or synced from GitHub.
        discriminator: { field: teamType, values: [pulumi, github] }
        operations:
          create:
            case: teamType
            pulumi: CreatePulumiTeam           # POST   /api/orgs/{orgName}/teams/pulumi
            github: CreateGitHubTeam           # POST   /api/orgs/{orgName}/teams/github
          read:   GetTeam                      # GET    /api/orgs/{orgName}/teams/{teamName}
          update: UpdateTeam                   # PATCH
          delete: DeleteTeam                   # DELETE
        id:
          template: "{organizationName}/{name}"
          params: [organizationName, name]
        forceNew: [organizationName, teamType]
        properties:
          organizationName:
            from: orgName
            source: path
            doc: Organization the team lives in.
          teamType:
            type: string
            source: body
            required: true
            # The polymorphic-create discriminator: which sub-path
            # (CreatePulumiTeam / CreateGitHubTeam) gets called. The
            # GetTeam response doesn't echo teamType back, so without
            # writeOnly the value would silently disappear from state
            # after refresh and Delete would have no scope to pick.
            writeOnly: true
            enum: [pulumi, github]
            doc: Team type. "pulumi" for a Pulumi-managed team; "github" for a team synced from a GitHub organization.
          name:
            type: string
            # On Read/Update/Delete the team name is a path param
            # (`/api/orgs/{orgName}/teams/{teamName}`). On Create, the
            # path is `/api/orgs/{orgName}/teams/pulumi` (no teamName)
            # and the value goes in the request body as `name`.
            # createSource/createFrom express that per-verb difference.
            source: path
            from: teamName
            createSource: body
            createFrom: name
            requireIf: "teamType == pulumi"
            doc: Team name. Must be unique within the organization. Required for `pulumi` teams.
          githubTeamId:
            type: integer
            source: body
            requireIf: "teamType == github"
            doc: Numeric GitHub team ID. Required for `github` teams.
          displayName:
            type: string
            source: body
            defaultFromField: name
            doc: Human-readable display name.
          description:
            type: string
            source: body
            doc: Team description.
          members:
            type: array
            source: body
            sortOnRead: true
            items: { type: string }
            doc: List of usernames in the team.
    functions:
      listTeams:     { operationId: ListTeams }
      listTeamRoles: { operationId: ListTeamRoles }

  orgs/tokens:
    resources:
      OrgAccessToken:
        operations:
          create: CreateOrgToken               # POST   /api/orgs/{orgName}/tokens
          delete: DeleteOrgToken               # DELETE /api/orgs/{orgName}/tokens/{tokenId}
          # Spec has no per-token GET; Read falls back to listing and
          # filtering by id.
          readVia:
            operationId: ListOrgTokens         # GET    /api/orgs/{orgName}/tokens
            filterBy: id
        id:
          template: "{organizationName}/{tokenId}"
          params: [organizationName, tokenId]
        forceNew: [organizationName, name, description]
        # The Create response only carries `id` and `tokenValue`; the
        # body-sourced inputs (name, description, expires) aren't
        # echoed back. Mark them writeOnly so ResponseToOutputs
        # preserves them from inputs across Create + List-Read,
        # otherwise the next diff would flag them as added.
        properties:
          organizationName: { from: orgName, source: path }
          name:
            from: name
            source: body
            writeOnly: true
            defaultFromField: description
            doc: Token name. Unique across the organization (including deleted tokens). Defaults to the description if omitted.
          description:
            from: description
            source: body
            writeOnly: true
          expires:
            from: expires
            source: body
            type: integer
            default: 0
            writeOnly: true
            doc: Unix epoch expiration. `0` (the default) means no expiry.
          value:   { from: tokenValue, source: response, secret: true, output: true }
          tokenId: { from: id,         source: response, output: true }
      TeamAccessToken:
        operations:
          create: CreateTeamToken              # POST   /api/orgs/{orgName}/teams/{teamName}/tokens
          delete: DeleteTeamToken              # DELETE
          readVia: { operationId: ListTeamTokens, filterBy: id }
        id:
          template: "{organizationName}/{teamName}/{tokenId}"
          params: [organizationName, teamName, tokenId]
        forceNew: [organizationName, teamName, name, description]
        properties:
          organizationName: { from: orgName,  source: path }
          teamName:         { from: teamName, source: path }
          name:
            from: name
            source: body
            writeOnly: true
            defaultFromField: description
            doc: Token name. Unique within the team (including deleted tokens). Defaults to the description if omitted.
          description:
            from: description
            source: body
            writeOnly: true
          expires:
            from: expires
            source: body
            type: integer
            default: 0
            writeOnly: true
            doc: Unix epoch expiration. `0` (the default) means no expiry.
          value:   { from: tokenValue, source: response, secret: true, output: true }
          tokenId: { from: id,         source: response, output: true }
      AccessToken:                             # user/personal access token
        operations:
          create: CreatePersonalToken          # POST   /api/user/tokens
          delete: DeletePersonalToken          # DELETE /api/user/tokens/{tokenId}
          readVia: { operationId: ListPersonalTokens, filterBy: id }
        id:
          template: "{tokenId}"
          params: [tokenId]
        forceNew: [name, description]
        properties:
          name:
            from: name
            source: body
            writeOnly: true
            defaultFromField: description
            doc: Token name. Defaults to the description if omitted.
          description:
            from: description
            source: body
            writeOnly: true
          expires:
            from: expires
            source: body
            type: integer
            default: 0
            writeOnly: true
            doc: Unix epoch expiration. `0` (the default) means no expiry.
          value:   { from: tokenValue, source: response, secret: true, output: true }
          tokenId: { from: id,         source: response, output: true }
    functions:
      # These list operations also serve as the readVia targets for
      # the corresponding token resources — declaring them as
      # functions makes them callable as data sources AND lets the
      # readVia mechanism resolve them through metadata.
      listOrgTokens:      { operationId: ListOrgTokens }
      listTeamTokens:     { operationId: ListTeamTokens }
      listPersonalTokens: { operationId: ListPersonalTokens }

  orgs/oidc:
    resources:
      # Just `Issuer`, not `OidcIssuer` — the `orgs/oidc` sub-module already
      # provides the OIDC context. The fully-qualified token reads
      # `pulumiservice:orgs/oidc:Issuer`.
      Issuer:
        doc: |
          Register an OIDC issuer to establish a trust relationship between
          third-party systems like GitHub Actions or CircleCI and Pulumi
          Cloud.
        operations:
          create: RegisterOidcIssuer   # POST   /api/orgs/{orgName}/oidc/issuers
          read:   GetOidcIssuer        # GET    /api/orgs/{orgName}/oidc/issuers/{issuerId}
          update: UpdateOidcIssuer     # PATCH
          delete: DeleteOidcIssuer     # DELETE
        id:
          template: "{organization}/{issuerId}"
          params: [organization, issuerId]
        forceNew: [organization]
        properties:
          organization:
            from: orgName
            type: string
            source: path
            required: true
            doc: Organization the OIDC issuer belongs to.
          name:
            type: string
            source: body
            required: true
            doc: A human-readable name for this issuer.
          url:
            type: string
            source: body
            required: true
            doc: Issuer URL (e.g., https://token.actions.githubusercontent.com).
          maxExpirationSeconds:
            type: integer
            source: body
            doc: Maximum validity of access tokens exchanged via this issuer.
          thumbprints:
            type: array
            source: body
            items: { type: string }
            doc: TLS certificate thumbprints trusted for this issuer. Usually derived automatically.
          policies:
            type: array
            source: body
            items: { ref: "pulumi.json#/Any" }
            sortOnRead: true
            doc: Authorization policies controlling which workloads can exchange OIDC tokens for Pulumi tokens.
          issuerId:
            type: string
            # Response shape uses `id`; the SDK exposes `issuerId` per
            # the v2 anti-stutter convention. Path-side uses `{issuerId}`.
            from: id
            source: response
            output: true
            doc: Server-assigned issuer ID.
    functions:
      listIssuers:   { operationId: List_orgs_oidc_issuers }
      getAuthPolicy: { operationId: GetAuthPolicy }     # auth policy on an issuer
    methods:
      Issuer.regenerateThumbprints:
        resource: orgs/oidc:Issuer
        operationId: RegenerateThumbprints
      Issuer.updateAuthPolicy:
        resource: orgs/oidc:Issuer
        operationId: UpdateAuthPolicy

  orgs/policies:
    resources:
      PolicyGroup:
        operations:
          create: NewPolicyGroup               # POST   /api/orgs/{orgName}/policygroups
          read:   GetPolicyGroup               # GET    /api/orgs/{orgName}/policygroups/{policyGroup}
          update: UpdatePolicyGroup            # PATCH
          delete: DeletePolicyGroup            # DELETE
        id:
          template: "{organizationName}/{name}"
          params: [organizationName, name]
        forceNew: [organizationName, entityType]
        properties:
          organizationName: { from: orgName, source: path }
          name:
            type: string
            # On Read/Update/Delete the policy group name is a path
            # param (`/api/.../policygroups/{policyGroup}`); on Create
            # the path has no placeholder and the value goes in the
            # body as `name`.
            source: path
            from: policyGroup
            createSource: body
            createFrom: name
            required: true
            doc: Policy group name. Unique within the organization.
          entityType:
            type: string
            source: body
            default: stacks
            enum: [stacks, accounts]
            writeOnly: true
            doc: The type of entities this policy group applies to. Defaults to `stacks`.
          mode:
            type: string
            source: body
            enum: [audit, preventative]
            writeOnly: true
            doc: Enforcement mode. Defaults to `audit` for account groups, `preventative` for stack groups.
          agentPoolId:
            type: string
            source: body
            writeOnly: true
            doc: Optional agent pool ID for policy evaluation. Defaults to the Pulumi-hosted pool.
    functions:
      getPolicyPack:  { operationId: GetPolicyPack }
      listPolicyPacks: { operationId: ListPolicyPacks_orgs }
      # Policy enforcement reporting — read-only views of policy-pack runs and
      # violations. Useful for alerting/remediation programs that need to
      # query "what's failing under policy X across the org."
      listPolicyViolations: { operationId: ListPolicyViolationsV2 }
      listPolicyIssues:     { operationId: ListPolicyIssues }
      getPolicyIssue:       { operationId: GetPolicyIssue }
      getPolicyIssueFilters: { operationId: GetPolicyIssuesFilters }
      getPolicyResultsMetadata: { operationId: GetPolicyResultsMetadata }
      listPoliciesCompliance: { operationId: ListPoliciesCompliance }

  orgs/templates:
    resources:
      # Just `Source`, not `TemplateSource` — `orgs/templates:Source` reads
      # cleanly as "template source" because the module provides the context.
      Source:
        doc: A source for Pulumi templates — a git repository or URL from which `pulumi new` templates are sourced.
        operations:
          create: CreateOrgTemplateCollection  # POST   /api/orgs/{orgName}/templates/sources
          update: UpdateOrgTemplateCollection  # PATCH  /api/orgs/{orgName}/templates/sources/{templateID}
          delete: DeleteOrgTemplateCollection  # DELETE
          readVia: { operationId: GetOrgTemplateCollections, filterBy: id }
        id:
          template: "{organizationName}/{templateId}"
          params: [organizationName, templateId]
        forceNew: [organizationName]
        properties:
          organizationName:
            from: orgName
            type: string
            source: path
            required: true
            doc: Organization the template source belongs to.
          sourceName:
            type: string
            source: body
            from: name
            required: true
            doc: Human-readable name for this template source.
          sourceURL:
            type: string
            source: body
            required: true
            doc: URL of the template source (typically a git repository).
          destination:
            ref: "pulumi.json#/Any"
            source: body
            doc: Optional destination settings for rendered templates.
          templateId:
            type: string
            from: id
            pathName: templateID
            source: response
            output: true
            doc: Server-assigned template source ID.
    functions:
      # readVia target — also exposed as a list data source.
      listTemplateSources: { operationId: GetOrgTemplateCollections }
      # Project template discovery — what `pulumi new` would scaffold for a project.
      getProjectTemplate:              { operationId: GetProjectTemplate }
      getProjectTemplateConfiguration: { operationId: GetProjectTemplateConfiguration }

  # ─── Stacks ─────────────────────────────────────────────────────────────

  stacks:
    resources:
      Stack:
        doc: |
          A Pulumi Cloud stack registration. Owns the stack's existence in
          Pulumi Cloud; stack *content* is managed by the Pulumi programs
          deploying to it. `stackName` sits in the create request body
          (POST /api/stacks/{org}/{project}) but in the path of the
          resource-scoped verbs — declared via the `createSource:` override.
        operations:
          create: CreateStack
          read:   GetStack
          delete: DeleteStack
        id:
          template: "{organizationName}/{projectName}/{stackName}"
          params: [organizationName, projectName, stackName]
        forceNew: [organizationName, projectName, stackName]
        properties:
          organizationName:
            from: orgName
            type: string
            source: path
            required: true
            doc: Organization name.
          projectName:
            from: projectName
            type: string
            source: path
            required: true
            doc: Project name.
          stackName:
            from: stackName
            type: string
            source: path
            createSource: body   # POSTed on create, then path-addressable
            required: true
            doc: Stack name.
    methods:
      Stack.pauseDeployments:
        resource: stacks:Stack
        operationId: PauseStackDeployments
      Stack.resumeDeployments:
        resource: stacks:Stack
        operationId: ResumeStackDeployments

  stacks/hooks:
    resources:
      Webhook:
        # Polymorphic: organization-level, stack-level, and ESC-level webhooks
        # share a shape but use different CRUD endpoints. The `case: scope`
        # selector picks which operation to dispatch based on inputs.
        operations:
          case: scope
          scopes:
            org:
              create: CreateOrganizationWebhook
              read:   GetOrganizationWebhook
              update: UpdateOrganizationWebhook
              delete: DeleteOrganizationWebhook
            stack:
              create: CreateStackWebhook
              read:   GetStackWebhook
              update: UpdateStackWebhook
              delete: DeleteStackWebhook
            esc:
              create: CreateWebhook_esc_environments
              read:   GetWebhook_esc_environments
              update: UpdateWebhook_esc_environments
              delete: DeleteWebhook_esc_environments
        id:
          case: scope
          templates:
            org:   "{organizationName}/{name}"
            stack: "{organizationName}/{projectName}/{stackName}/{name}"
            esc:   "{organizationName}/environment/{projectName}/{environmentName}/{name}"
        doc: |
          Pulumi Webhooks allow you to notify external services of events
          happening within your Pulumi organization, stack, or ESC
          environment. Webhook scope is determined by which identity fields
          you set: `organizationName` alone → org-scoped; plus
          `projectName` + `stackName` → stack-scoped; or plus
          `environmentName` (with `projectName`) → ESC-scoped.
        forceNew: [organizationName, projectName, stackName, environmentName]
        properties:
          # Webhook identity fields go in BOTH the URL path AND the
          # request body — the API validates they agree. `from`
          # gives the path-side wire name; the body-side wire name
          # is the SDK property name (matches the Webhook component
          # schema's field names: `organizationName`, `projectName`,
          # `envName`, `stackName`).
          organizationName:
            type: string
            source: pathAndBody
            from: orgName
            required: true
            doc: Organization that owns the webhook.
          projectName:
            type: string
            source: pathAndBody
            doc: Project the webhook belongs to (stack- or ESC-scoped webhooks only).
          stackName:
            type: string
            source: pathAndBody
            doc: Stack the webhook belongs to (stack-scoped webhooks only).
          environmentName:
            type: string
            source: pathAndBody
            # Path uses `{envName}`; body uses `envName` too
            # (consistent here).
            from: envName
            bodyFrom: envName
            doc: Environment the webhook belongs to (ESC-scoped webhooks only).
          name:
            type: string
            source: response
            output: true
            # Spec uses `name` in the body/response and `{hookName}`
            # in the URL path of resource-scoped verbs.
            pathName: hookName
            doc: Webhook name, assigned by the server.
          displayName:
            type: string
            source: body
            required: true
            doc: Human-readable display name for the webhook.
          payloadUrl:
            from: payloadURL
            type: string
            source: body
            required: true
            doc: URL the webhook POSTs to.
          format:
            type: string
            source: body
            default: raw
            enum: [raw, slack, pulumi_deployments, ms_teams]
            doc: Payload encoding — "raw" by default; other options shape the body for specific consumers.
          active:
            type: boolean
            source: body
            required: true
            default: true
            doc: Whether the webhook is currently firing.
          secret:
            type: string
            source: body
            secret: true
            diffMode: ciphertext
            doc: Shared secret used to sign webhook payloads (HMAC-SHA256).
          filters:
            type: array
            source: body
            sortOnRead: true
            items: { type: string }
            doc: Event filter strings restricting which events trigger the webhook.
          groups:
            type: array
            source: body
            sortOnRead: true
            items: { type: string }
            doc: Event group filters (stacks, deployments, environments).
        checks:
          # organizationName is always required (declared on the property
          # itself). The scope selector is `stackName` vs `environmentName`
          # — mutually exclusive, or both omitted for org-scoped hooks.
          - requireAtMostOne: [stackName, environmentName]
            message: "stackName and environmentName are mutually exclusive; omit both for an org-scoped webhook, set one for the matching scope"
          # projectName is required when either scope selector is present
          # (stack- and ESC-scoped URLs both path through the project).
          - requireIfSet: stackName
            field: projectName
          - requireIfSet: environmentName
            field: projectName
        sortProperties: [groups, filters]
    functions:
      # Per-scope delivery audit views. The Webhook resource itself is
      # polymorphic over scope; methods on it would also need to dispatch
      # by scope (no method-polymorphism in the runtime today), so the
      # delivery views are surfaced as separate scope-specific functions
      # instead — callers know which scope their webhook lives in.
      getOrganizationWebhookDeliveries: { operationId: GetOrganizationWebhookDeliveries }
      getStackWebhookDeliveries:        { operationId: GetStackWebhookDeliveries }
      getEnvironmentWebhookDeliveries:  { operationId: GetWebhookDeliveries_esc_environments }

  stacks/deployments:
    resources:
      # Just `Schedule`, not `DeploymentSchedule` — the `stacks/deployments`
      # module frames the noun. Sibling `DriftSchedule`/`TtlSchedule` keep
      # their qualifier because they identify a *kind* of schedule that
      # diverges from the default deployment one (drift scan, TTL destroy).
      Schedule:
        doc: A scheduled recurring or single-time run of a Pulumi command on a stack.
        operations:
          create: CreateScheduledDeployment    # POST   /api/stacks/.../deployments/schedules
          read:   ReadScheduledDeployment
          update: UpdateScheduledDeployment
          delete: DeleteScheduledDeployment
        id:
          template: "{organization}/{project}/{stack}/{scheduleId}"
          params: [organization, project, stack, scheduleId]
        forceNew: [organization, project, stack]
        properties:
          organization:
            from: orgName
            type: string
            source: path
            required: true
            doc: Organization name.
          project:
            from: projectName
            type: string
            source: path
            required: true
            doc: Project name.
          stack:
            from: stackName
            type: string
            source: path
            required: true
            doc: Stack name.
          pulumiOperation:
            type: string
            source: body
            required: true
            enum: [update, preview, refresh, destroy]
            doc: Which Pulumi operation to run on schedule.
          scheduleCron:
            type: string
            source: body
            doc: Cron expression for recurring schedules. Mutually exclusive with `timestamp`.
          timestamp:
            type: string
            source: body
            doc: RFC3339 timestamp for a single-time run. Mutually exclusive with `scheduleCron`.
          scheduleId:
            from: id
            pathName: scheduleID
            type: string
            source: response
            output: true
            doc: Server-assigned schedule ID.
      DriftSchedule:
        doc: A cron schedule to run drift detection on a stack.
        operations:
          create: CreateScheduledDriftDeployment
          update: UpdateScheduledDriftDeployment
          read:   ReadScheduledDeployment      # shared read endpoint
          delete: DeleteScheduledDeployment    # shared delete endpoint
        id:
          template: "{organization}/{project}/{stack}/{scheduleId}"
          params: [organization, project, stack, scheduleId]
        forceNew: [organization, project, stack]
        properties:
          organization:
            from: orgName
            type: string
            source: path
            required: true
            doc: Organization name.
          project:
            from: projectName
            type: string
            source: path
            required: true
            doc: Project name.
          stack:
            from: stackName
            type: string
            source: path
            required: true
            doc: Stack name.
          scheduleCron:
            type: string
            source: body
            required: true
            doc: Cron expression for how often drift detection runs.
          autoRemediate:
            type: boolean
            source: body
            doc: When true, automatically run an update to reconcile detected drift.
          scheduleId:
            from: id
            pathName: scheduleID
            type: string
            source: response
            output: true
            doc: Server-assigned schedule ID.
      TtlSchedule:
        doc: A scheduled stack destroy run, for ephemeral environments.
        operations:
          create: CreateScheduledTTLDeployment
          update: UpdateScheduledTTLDeployment
          read:   ReadScheduledDeployment      # shared read endpoint
          delete: DeleteScheduledDeployment    # shared delete endpoint
        id:
          template: "{organization}/{project}/{stack}/{scheduleId}"
          params: [organization, project, stack, scheduleId]
        forceNew: [organization, project, stack]
        properties:
          organization:
            from: orgName
            type: string
            source: path
            required: true
            doc: Organization name.
          project:
            from: projectName
            type: string
            source: path
            required: true
            doc: Project name.
          stack:
            from: stackName
            type: string
            source: path
            required: true
            doc: Stack name.
          timestamp:
            type: string
            source: body
            required: true
            doc: RFC3339 timestamp after which the TTL destroy runs.
          deleteAfterDestroy:
            type: boolean
            source: body
            doc: When true, delete the stack itself (not just resources) after the destroy succeeds.
          scheduleId:
            from: id
            pathName: scheduleID
            type: string
            source: response
            output: true
            doc: Server-assigned schedule ID.
      Settings:
        doc: |
          Deployment settings for a Pulumi Cloud stack — source context,
          executor, and secrets for Pulumi Deployments. PUT is the upsert
          endpoint (create and update both map to ReplaceDeploymentSettings).
          Complex sub-objects (github, executorContext, operationContext,
          cacheOptions, vcs) are typed as `pulumi.json#/Any` for v2.0.0-alpha;
          tightening their shapes is 2.x follow-up work.
        operations:
          create: ReplaceDeploymentSettings   # PUT = upsert
          read:   GetDeploymentSettings
          update: ReplaceDeploymentSettings
          delete: DeleteDeploymentSettings
        id:
          template: "{organization}/{project}/{stack}"
          params: [organization, project, stack]
        forceNew: [organization, project, stack]
        properties:
          organization:
            from: orgName
            type: string
            source: path
            required: true
            doc: Organization name.
          project:
            from: projectName
            type: string
            source: path
            required: true
            doc: Project name.
          stack:
            from: stackName
            type: string
            source: path
            required: true
            doc: Stack name.
          github:
            from: gitHub
            ref: "pulumi.json#/Any"
            source: body
            doc: GitHub VCS settings — repository, branch/path filters, and push triggers.
          sourceContext:
            ref: "pulumi.json#/Any"
            source: body
            doc: Source context — git coordinates or other VCS location.
          executorContext:
            ref: "pulumi.json#/Any"
            source: body
            doc: Executor context — agent pool, docker image, or custom runner.
          operationContext:
            ref: "pulumi.json#/Any"
            source: body
            doc: Operation context — pre-run commands, environment variables, and OIDC settings.
          cacheOptions:
            ref: "pulumi.json#/Any"
            source: body
            doc: Cache options for deployment artifacts.
          agentPoolId:
            from: agentPoolID
            type: string
            source: body
            doc: Agent pool ID this stack's deployments run on.
          vcs:
            ref: "pulumi.json#/Any"
            source: body
            doc: Generic VCS settings (used when `github` isn't applicable).
    methods:
      Schedule.pause:
        resource: stacks/deployments:Schedule
        operationId: PauseScheduledDeployment
      Schedule.resume:
        resource: stacks/deployments:Schedule
        operationId: ResumeScheduledDeployment

  stacks/tags:
    # `Tag` (per-tag) and `Tags` (whole-map) are both metadata-driven.
    # Their reads piggyback on the parent stack GET — Pulumi Cloud exposes
    # no per-tag GET — via `readVia.extractField: tags`. `Tags.delete`
    # iterates per-key over the state's `tags` map.
    resources:
      Tag:
        doc: A single tag (name + value) on a Pulumi Cloud stack.
        operations:
          create: AddStackTag          # POST  /api/stacks/.../tags       body {name, value}
          update: UpdateStackTag       # PATCH /api/stacks/.../tags/{tagName} body {name, value}
          delete: DeleteStackTag       # DELETE .../tags/{tagName}
          readVia:
            operationId: GetStack      # GET /api/stacks/.../stackName — response.tags
            extractField: tags
            keyBy: name
            valueProperty: value
        id:
          template: "{organization}/{project}/{stack}/{name}"
          params: [organization, project, stack, name]
        forceNew: [organization, project, stack, name]
        properties:
          organization:
            from: orgName
            type: string
            source: path
            required: true
            doc: Organization name.
          project:
            from: projectName
            type: string
            source: path
            required: true
            doc: Project name.
          stack:
            from: stackName
            type: string
            source: path
            required: true
            doc: Stack name.
          name:
            from: tagName             # path-side wire name (UpdateStackTag/DeleteStackTag)
            type: string
            source: path
            createSource: body        # body-side on AddStackTag
            createFrom: name          # body field literally "name"
            required: true
            doc: Tag name.
          value:
            type: string
            source: body
            required: true
            doc: Tag value.
      Tags:
        doc: |
          A set of stack tags managed as a single resource via a `tags` map.
          Create/Update use the batch PATCH endpoint. Delete iterates once
          per tag in the map (there's no batch-delete API).
        operations:
          # bodyAs: the tags map IS the body (the spec's PATCH endpoint
          # accepts `{tagName: value, ...}` directly, not wrapped under
          # a `tags:` key).
          create:
            operationId: UpdateStackTags
            bodyAs: tags
          update:
            operationId: UpdateStackTags
            bodyAs: tags
          delete:
            operationId: DeleteStackTag    # DELETE /.../tags/{tagName}
            iterateOver: tags
            iterateKeyParam: tagName
          readVia:
            operationId: GetStack
            extractField: tags          # whole-map mode: no keyBy
        id:
          template: "{organization}/{project}/{stack}"
          params: [organization, project, stack]
        forceNew: [organization, project, stack]
        properties:
          organization:
            from: orgName
            type: string
            source: path
            required: true
            doc: Organization name.
          project:
            from: projectName
            type: string
            source: path
            required: true
            doc: Project name.
          stack:
            from: stackName
            type: string
            source: path
            required: true
            doc: Stack name.
          tags:
            type: object
            source: body
            additionalProperties: { type: string }
            required: true
            doc: Tag name → tag value map managed by this resource.

  stacks/permissions:
    resources:
      TeamStackPermission:
        doc: |
          Grants a team a specific permission level on a stack. The Pulumi
          Cloud API exposes a single PATCH endpoint that is both create and
          update; removal is done by PATCHing permission:0 via the same
          endpoint (the `delete.bodyOverride` below).
        operations:
          create: UpdateTeamStackPermissions
          update: UpdateTeamStackPermissions
          # No per-team GET — a soft Read via the stack's GET would require
          # readVia:extractField; the metadata surfaces a DELETE here, and
          # readVia falls through to "return prior inputs" via the dispatcher's
          # default for resources without Read.
          delete:
            operationId: UpdateTeamStackPermissions
            bodyOverride: { permission: 0 }
        id:
          template: "{organization}/{project}/{stack}/{team}"
          params: [organization, project, stack, team]
        forceNew: [organization, project, stack, team]
        properties:
          organization:
            from: orgName
            type: string
            source: path
            required: true
            doc: Organization name.
          project:
            from: projectName
            type: string
            source: path
            required: true
            doc: Project name.
          stack:
            from: stackName
            type: string
            source: path
            required: true
            doc: Stack name.
          team:
            from: teamName
            type: string
            source: path
            required: true
            doc: Team name.
          permission:
            type: integer
            source: body
            required: true
            doc: "Permission level: 0 = no permission, 101 = read, 102 = edit, 103 = admin."

  # ─── ESC (Environments, Secrets, Config) ────────────────────────────────

  esc:
    resources:
      Environment:
        doc: |
          An ESC (Environments, Secrets, Config) environment. Create is a
          two-step operation — POST (empty env with project+name in JSON
          body) followed by PATCH (YAML document as `application/x-yaml`
          raw body) — expressed via `postCreate:` on the resource and
          `rawBodyFrom:` on the follow-on op. Read also returns
          `application/x-yaml`; the raw body comes back into the `yaml`
          property via `rawBodyTo:`.
        operations:
          create: CreateEnvironment_esc_environments   # POST   /api/esc/environments/{orgName}                  body {project, name}
          postCreate:                                  # PATCH  /api/esc/environments/{org}/{proj}/{envName}     body: yaml (raw)
            operationId: UpdateEnvironment_esc_environments
            rawBodyFrom: yaml
            contentType: application/x-yaml
          read:
            operationId: ReadEnvironment_esc_environments
            rawBodyTo: yaml
            contentType: application/x-yaml
          update:
            operationId: UpdateEnvironment_esc_environments
            rawBodyFrom: yaml
            contentType: application/x-yaml
          delete: DeleteEnvironment_esc_environments   # DELETE /api/esc/environments/{org}/{proj}/{envName}
        id:
          template: "{organization}/{project}/{name}"
          params: [organization, project, name]
        forceNew: [organization, project, name]
        properties:
          organization:
            from: orgName
            type: string
            source: path
            required: true
            doc: Organization that owns the environment.
          project:
            from: projectName
            type: string
            source: path
            createSource: body          # POST body has `project`, path has `orgName` only
            createFrom: project
            default: default
            doc: Project the environment belongs to (defaults to "default").
          name:
            from: envName
            type: string
            source: path
            createSource: body          # POST body has `name`, path has `orgName` only
            createFrom: name
            required: true
            doc: Environment name.
          yaml:
            type: string
            source: rawBody             # never in path/query/JSON body; only via rawBodyFrom
            required: true
            secret: true
            doc: |
              The environment definition as YAML text. ESC documents carry
              secrets; the property is marked secret so Pulumi state keeps
              it encrypted.
    functions:
      # ESC environment listing — useful for org dashboards / drift reports.
      listEnvironments: { operationId: ListOrgEnvironments_esc }
      # ESC provider + rotator catalogs — discoverable via the API. These
      # power the editor's "imports" suggestions and rotation-schedule
      # configuration UIs; useful to teams generating ESC YAML programmatically.
      listProviders:     { operationId: ListProviders_esc }
      getProviderSchema: { operationId: GetProviderSchema_esc }
      listRotators:      { operationId: ListRotators }
      getRotatorSchema:  { operationId: GetRotatorSchema }

  esc/schedules:
    resources:
      # Just `Rotation`, not `EnvironmentRotationSchedule` — the `esc/schedules`
      # module provides both "esc" and "schedule" context. Fully-qualified:
      # `pulumiservice:esc/schedules:Rotation`.
      Rotation:
        doc: A scheduled recurring rotation of secrets in an ESC environment.
        operations:
          create: CreateEnvironmentSchedule    # POST   /api/esc/environments/.../schedules
          read:   ReadEnvironmentSchedule
          update: UpdateEnvironmentSchedule
          delete: DeleteEnvironmentSchedule
        id:
          template: "{organization}/{project}/{environment}/{scheduleId}"
          params: [organization, project, environment, scheduleId]
        forceNew: [organization, project, environment]
        properties:
          organization:
            from: orgName
            type: string
            source: path
            required: true
            doc: Organization name.
          project:
            from: projectName
            type: string
            source: path
            default: default
            doc: Project name (defaults to "default").
          environment:
            from: envName
            type: string
            source: path
            required: true
            doc: Environment name.
          scheduleCron:
            type: string
            source: body
            doc: Cron expression for recurring rotations. Mutually exclusive with `timestamp`.
          timestamp:
            type: string
            source: body
            doc: RFC3339 timestamp for a single rotation. Mutually exclusive with `scheduleCron`.
          scheduleId:
            from: id
            pathName: scheduleID
            type: string
            source: response
            output: true
            doc: Server-assigned schedule ID.
    methods:
      Rotation.pause:
        resource: esc/schedules:Rotation
        operationId: PauseEnvironmentSchedule
      Rotation.resume:
        resource: esc/schedules:Rotation
        operationId: ResumeEnvironmentSchedule

  esc/versions:
    resources:
      # Just `Tag`, not `EnvironmentVersionTag` — the `esc/versions` module
      # provides the context. Fully-qualified: `pulumiservice:esc/versions:Tag`.
      Tag:
        doc: A named tag attached to a specific revision of an ESC environment.
        operations:
          create: CreateRevisionTag_esc_environments_versions_tags
          read:   ReadRevisionTag_esc_environments
          update: UpdateRevisionTag_esc_environments
          delete: DeleteRevisionTag_esc_environments
        id:
          template: "{organization}/{project}/{environment}/{tagName}"
          params: [organization, project, environment, tagName]
        forceNew: [organization, project, environment, tagName]
        properties:
          organization:
            from: orgName
            type: string
            source: path
            required: true
            doc: Organization name.
          project:
            from: projectName
            type: string
            source: path
            default: default
            doc: Project name (defaults to "default").
          environment:
            from: envName
            type: string
            source: path
            required: true
            doc: Environment name.
          tagName:
            type: string
            source: path
            required: true
            doc: Tag name.
          revision:
            type: integer
            source: body
            required: true
            doc: Revision number the tag points to.

  esc/permissions:
    resources:
      TeamEnvironmentPermission:
        doc: |
          Grants a team a specific permission level on an ESC environment.
          The Pulumi Cloud API does not expose a dedicated CRUD endpoint —
          membership is mutated through `UpdateTeam` with the body wrapped
          under `addEnvironmentPermission` (create), `editEnvironmentPermission`
          (update), or `removeEnvironment` (delete). The `bodyWrap:` primitive
          on each verb selects the right wrapper. No dedicated GET — Read
          falls through to the prior inputs (matches how `TeamStackPermission`
          is structured).
        operations:
          create:
            operationId: UpdateTeam
            bodyWrap: addEnvironmentPermission
          update:
            operationId: UpdateTeam
            bodyWrap: editEnvironmentPermission
          delete:
            operationId: UpdateTeam
            bodyWrap: removeEnvironment
        id:
          template: "{organizationName}/{teamName}/{projectName}/{envName}"
          params: [organizationName, teamName, projectName, envName]
        forceNew: [organizationName, teamName, projectName, envName]
        properties:
          organizationName:
            from: orgName
            type: string
            source: path
            required: true
            doc: Organization name.
          teamName:
            type: string
            source: path
            required: true
            doc: Team being granted environment access.
          projectName:
            type: string
            source: body
            required: true
            doc: ESC project the environment belongs to.
          envName:
            type: string
            source: body
            required: true
            doc: ESC environment name.
          permission:
            type: string
            source: body
            enum: [none, read, open, write, admin]
            doc: Permission level granted to the team. Omit on delete.

  # ─── SAML / SSO identity providers ──────────────────────────────────────

  orgs/identity:
    resources:
      IdentityProvider:
        doc: |
          Organization identity provider configuration (SAML/SSO). Declarative
          resource over the SAML-organization endpoints: PATCH is
          create-or-update (upsert), GET reads the current config, DELETE
          tears it down.
        operations:
          # PATCH is the create + update path (upsert). Read + delete are
          # dedicated. No separate POST exists.
          create: UpdateSAMLOrganization
          read:   GetSAMLOrganization
          update: UpdateSAMLOrganization
          delete: DeleteIdentityProvider
        id:
          template: "{organizationName}"
          params: [organizationName]
        forceNew: [organizationName]
        properties:
          organizationName:
            from: orgName
            type: string
            source: path
            required: true
            doc: Organization the identity provider is configured for.
          providerType:
            from: type
            type: string
            source: body
            enum: [saml]
            default: saml
            doc: Identity provider protocol. Only `saml` is supported today.
          metadataUrl:
            type: string
            source: body
            doc: SAML metadata URL (IdP publishes this). Mutually exclusive with `metadataXml`.
          metadataXml:
            type: string
            source: body
            secret: true
            doc: SAML metadata document content (XML). Mutually exclusive with `metadataUrl`.
          ssoUrl:
            type: string
            source: body
            doc: IdP single-sign-on endpoint.
          certificate:
            type: string
            source: body
            doc: IdP signing certificate (PEM).
          enforceSAML:
            type: boolean
            source: body
            doc: When true, require SAML for all org members (no local-credential fallback).
        checks:
          - requireOneOf: [metadataUrl, metadataXml]
            message: "exactly one of metadataUrl or metadataXml must be provided"
    functions:
      listSamlAdmins:             { operationId: ListSAMLOrganizationAdmins }
      listIdentityProviderOrgs:   { operationId: ListIdentityProviderOrganizations }
    methods:
      IdentityProvider.updateAdmins:
        resource: orgs/identity:IdentityProvider
        operationId: UpdateSAMLOrganizationAdmins
      IdentityProvider.setSoleAdmin:
        resource: orgs/identity:IdentityProvider
        operationId: SetSoleOrganizationAdmin
      IdentityProvider.syncWithIdp:
        resource: orgs/identity:IdentityProvider
        operationId: SyncWithIdentityProvider

  # ─── Audit logs ─────────────────────────────────────────────────────────

  orgs/audit:
    resources:
      LogExport:
        doc: |
          Streams Pulumi Cloud organization audit logs to an S3 bucket.
          Every admin action (token creation, team membership change,
          policy group update, stack delete, …) is emitted to the
          configured bucket on the cadence Pulumi Cloud supports.
          Required for SOC 2 / ISO 27001 / HIPAA compliance flows.
        operations:
          create: UpdateAuditLogExportConfiguration  # POST (idempotent upsert)
          read:   GetAuditLogExportConfiguration     # GET
          update: UpdateAuditLogExportConfiguration  # POST same endpoint
          delete: DeleteAuditLogExportConfiguration  # DELETE
        id:
          template: "{organizationName}"
          params: [organizationName]
        forceNew: [organizationName]
        properties:
          organizationName:
            from: orgName
            type: string
            source: path
            required: true
            doc: Organization whose audit log is being exported.
          enabled:
            type: boolean
            source: body
            # Body uses `newEnabled` (set-this-to semantics); the GET
            # response returns the canonical `enabled`. bodyFrom keeps
            # those two wire names separate without forcing the SDK
            # name to match either. writeOnly preserves the input
            # value across the Create response (which doesn't echo
            # state) so subsequent diffs don't see drift.
            from: enabled
            bodyFrom: newEnabled
            required: true
            default: true
            writeOnly: true
            doc: Whether the export is currently active. Set to false to pause without deleting.
          s3Configuration:
            ref: "pulumi.json#/Any"
            source: body
            # GET response uses `s3Config`; PUT body uses
            # `newS3Configuration`. The SDK name `s3Configuration`
            # reads cleanly in user code; bridge to the wire names.
            from: s3Config
            bodyFrom: newS3Configuration
            required: true
            writeOnly: true
            doc: |
              S3 destination settings — an object with `iamRoleArn`
              (role Pulumi Cloud assumes to write), `s3BucketName`,
              and optional `s3PathPrefix`.
    functions:
      listAuditLogEvents:     { operationId: ListAuditLogEventsHandlerV2 }
      exportAuditLogEvents:   { operationId: ExportAuditLogEventsHandlerV2 }
      getAuditLogsReaderKind: { operationId: GetAuditLogsReaderKind }
    methods:
      # Admin-trigger actions surfaced as methods on the export config.
      LogExport.forceExport:
        resource: orgs/audit:LogExport
        operationId: ForceAuditLogExport
      LogExport.testConfiguration:
        resource: orgs/audit:LogExport
        operationId: TestAuditLogExportConfiguration

  # ─── VCS integrations ───────────────────────────────────────────────────
  # Each integration type is a distinct resource (the wire shapes differ;
  # collapsing them into one polymorphic resource would obscure real API
  # differences). Actions like OAuth-flow completion are exposed as methods.

  integrations:
    resources:
      Github:
        operations:
          create: StartGitHubSetup                # POST
          read:   GetGitHubIntegration
          update: UpdateGitHubIntegration
          delete: DeleteGitHubIntegration
        id:
          template: "{organizationName}/github/{integrationId}"
          params: [organizationName, integrationId]
        forceNew: [organizationName]
      GithubEnterprise:
        operations:
          # No Create in the public spec — GHE integrations come online via
          # an admin-only setup path; v2 exposes them read/update/delete only
          # and documents creation via `pulumi import`.
          read:   GetGitHubEnterpriseIntegration
          update: UpdateGitHubEnterpriseIntegration
          delete: DeleteGitHubEnterpriseIntegration
        id:
          template: "{organizationName}/github-enterprise/{integrationId}"
          params: [organizationName, integrationId]
        forceNew: [organizationName]
      GitLab:
        operations:
          create: CreateGitLabSetup
          read:   GetGitLabIntegration
          update: UpdateGitLabIntegration
          delete: DeleteGitLabIntegration
        id:
          template: "{organizationName}/gitlab/{integrationId}"
          params: [organizationName, integrationId]
        forceNew: [organizationName]
      BitBucket:
        operations:
          create: CreateBitBucketSetup
          read:   GetBitBucketIntegration
          update: UpdateBitBucketIntegration
          delete: DeleteBitBucketIntegration
        id:
          template: "{organizationName}/bitbucket/{integrationId}"
          params: [organizationName, integrationId]
        forceNew: [organizationName]
      AzureDevOps:
        operations:
          create: CreateAzureDevOpsSetup
          read:   GetAzureDevOpsIntegration
          update: UpdateAzureDevOpsIntegration
          delete: DeleteAzureDevOpsIntegration
        id:
          template: "{organizationName}/azure-devops/{integrationId}"
          params: [organizationName, integrationId]
        forceNew: [organizationName]
    functions:
      listAllVCSIntegrations:      { operationId: ListAllVCSIntegrations }
      listGithubIntegrations:      { operationId: ListGitHubIntegrations }
      listGithubEnterpriseIntegrations: { operationId: ListGitHubEnterpriseIntegrations }
      listGitlabIntegrations:      { operationId: ListGitLabIntegrations }
      listBitbucketIntegrations:   { operationId: ListBitBucketIntegrations }
      listAzureDevOpsIntegrations: { operationId: ListAzureDevOpsIntegrations }
      getGithubAccessStatus:       { operationId: GetGitHubAccess }
      getGitlabAccessStatus:       { operationId: GetGitLabAccessStatus }
      getBitbucketAccessStatus:    { operationId: GetBitBucketAccessStatus }
      getAzureDevOpsAccessStatus:  { operationId: GetAzureDevOpsAccessStatus }
      listVCSRepos:                { operationId: ListVCSRepos }
      listVCSBranches:             { operationId: ListVCSBranches }
      listVCSRepoDestinations:     { operationId: ListVCSRepoDestinations }
      listAzureDevOpsOrganizations: { operationId: ListAzureDevOpsOrganizations }
      listAzureDevOpsProjects:     { operationId: ListAzureDevOpsProjects }
    methods:
      AzureDevOps.initiateOAuth:
        resource: integrations:AzureDevOps
        operationId: InitiateAzureDevOpsOAuth
      AzureDevOps.completeOAuth:
        resource: integrations:AzureDevOps
        operationId: CompleteAzureDevOpsOAuth

  # ─── ESC cloud setup (AWS / Azure / GCP OAuth wizards) ──────────────────
  # Cloud-setup flows are interactive OAuth dances, not a CRUD resource.
  # Expose them as functions + methods under esc/cloudsetup so programs can
  # trigger them imperatively (e.g. from a one-shot bootstrap script).

  esc/cloudsetup:
    functions:
      listAwsSSOAccounts:   { operationId: AWSSSOListAccounts }
      listAzureAccounts:    { operationId: AzureListAccounts }
      listGcpAccounts:      { operationId: GCPListAccounts }
    # The setup POSTs are top-level methods (no parent resource — ESC org
    # is implicit in the token).
    # They're registered under the cross-module methods block below.

  # ─── Change requests ────────────────────────────────────────────────────
  # Change requests are user-visible proposals routed through change gates.
  # Modeled as a resource for Create/Read/Update/Delete-like semantics;
  # the many action POSTs (approve, apply, close, etc.) are methods.

  changerequests:
    resources:
      ChangeRequest:
        operations:
          # No dedicated create endpoint in the public spec — change requests
          # are created by tooling during `pulumi up`, not directly authored.
          # v2 exposes Read/Update/Close + approve/unapprove as actions.
          read:   Get
          update: Update
          # Close is the closest analog to delete.
          delete: Close
        id:
          template: "{organizationName}/{changeRequestId}"
          params: [organizationName, changeRequestId]
        forceNew: [organizationName]
    functions:
      listChangeRequests:        { operationId: List_change_requests }
      listChangeRequestEvents:   { operationId: ListEvents }
    methods:
      # ChangeRequest is read-only (no create — change requests are produced
      # by the engine, not authored). Methods stay defined so the runtime
      # can dispatch them; the schema emitter currently skips resources
      # without create, so these methods aren't surfaced in SDKs yet.
      # Tracked as a follow-up: support read-only resources in the schema
      # emitter so these become callable as `cr.approve()` etc.
      ChangeRequest.approve:
        resource: changerequests:ChangeRequest
        operationId: Approve
      ChangeRequest.unapprove:
        resource: changerequests:ChangeRequest
        operationId: Unapprove
      ChangeRequest.apply:
        resource: changerequests:ChangeRequest
        operationId: Apply
      ChangeRequest.submit:
        resource: changerequests:ChangeRequest
        operationId: Submit
      ChangeRequest.addComment:
        resource: changerequests:ChangeRequest
        operationId: AddComment

  # ─── Customer Managed Keys (CMK) ────────────────────────────────────────

  orgs/cmk:
    resources:
      # Just `Key`, not `OrganizationKey` — the `cmk` module (customer-managed
      # keys) scopes the noun. Fully-qualified: `pulumiservice:orgs/cmk:Key`.
      Key:
        operations:
          create: CreateOrganizationKey
          # No dedicated single-key GET in the public spec; read from list.
          readVia: { operationId: ListOrganizationKeys, filterBy: id }
          # Keys are disabled rather than deleted in Pulumi Cloud's CMK flow.
          delete: DisableOrganizationKey
        id:
          template: "{organizationName}/{keyId}"
          params: [organizationName, keyId]
        forceNew: [organizationName]
    functions:
      listKeys:           { operationId: ListOrganizationKeys }
      listKeyMigrations:  { operationId: ListOrganizationKeyMigrations }
    methods:
      Key.setDefault:
        resource: orgs/cmk:Key
        operationId: SetDefaultOrganizationKey
      Key.disableAll:
        resource: orgs/cmk:Key
        operationId: DisableAllOrganizationKeys
      Key.retryMigrations:
        resource: orgs/cmk:Key
        operationId: RetryOrganizationKeyMigrations

  # ─── Organization members, roles, services ─────────────────────────────

  orgs/members:
    resources:
      # Just `Member`, not `OrganizationMember` — the `orgs/members` module
      # scopes the noun. Fully-qualified: `pulumiservice:orgs/members:Member`.
      Member:
        operations:
          create: AddOrganizationMember      # POST   /api/orgs/{orgName}/members/{userLogin}
          delete: DeleteOrganizationMember   # DELETE
          # No dedicated GET for a single membership — fall back to a list
          # filter when the spec adds one; for now Read is handled by Pulumi's
          # refresh sampling on other properties of the user.
          readVia: { operationId: ListOrganizationMembers, filterBy: userLogin }
        id:
          template: "{organizationName}/{userLogin}"
          params: [organizationName, userLogin]
        forceNew: [organizationName, userLogin]
    functions:
      listMembers:                { operationId: ListOrganizationMembers }
      listMemberStackPermissions: { operationId: ListMemberStackPermissions }

