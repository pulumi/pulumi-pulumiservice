name: yaml-oidc-issuer
runtime: yaml
description: A minimal example of provisioning OIDC Issuer via Pulumi YAML

# Thumbprints must match the certificate the issuer currently serves, so they
# are supplied via config rather than hardcoded. Compute one with:
#   openssl s_client -connect <issuer-host>:443 </dev/null | openssl x509 -fingerprint -sha256 -noout
config:
  pulumiThumbprint:
    type: string
  githubThumbprint:
    type: string

resources:
# A Pulumi OIDC Issuer with a basic policy
  pulumi_issuer:
    type: pulumiservice:index:OidcIssuer
    properties:
      organization: service-provider-test-org
      name: pulumi_issuer
      url: https://api.pulumi.com/oidc
      thumbprints:
        - ${pulumiThumbprint}
      policies:
        - decision: allow
          rules:
            aud: urn:pulumi:org:service-provider-test-org
            sub: pulumi:deploy:org:myTestOrg:project:myTestProject:*
          userLogin: pulumipus
          tokenType: personal
# A Github OIDC Issuer with all types of policies and TLS certificate thumbprint
  github_issuer:
    type: pulumiservice:index:OidcIssuer
    properties:
      organization: service-provider-test-org
      name: github_issuer
      url: https://token.actions.githubusercontent.com
      thumbprints:
        - ${githubThumbprint}
      policies:
        - decision: deny
          rules:
            aud: urn:pulumi:org:service-provider-test-org
            sub: repo:organization/repo:*
          userLogin: pulumipus
          tokenType: personal
        - decision: allow
          rules:
            aud: urn:pulumi:org:service-provider-test-org
            sub: repo:organization/repo:*
          authorizedPermissions:
            - admin
          tokenType: organization
        - decision: deny
          rules:
            aud: urn:pulumi:org:service-provider-test-org
            sub: repo:organization/repo:*
          teamName: dream-team
          tokenType: team