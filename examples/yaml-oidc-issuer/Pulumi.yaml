name: yaml-oidc-issuer
runtime: yaml
description: A minimal example of provisioning OIDC Issuer via Pulumi YAML

resources:
# A Pulumi OIDC Issuer with a basic policy
  pulumi_issuer:
    type: pulumiservice:index:OidcIssuer
    properties:
      organization: service-provider-test-org
      name: pulumi_issuer
      url: https://api.pulumi.com/oidc
      thumbprints:
        - 57d3e89f6b25dde3c174dc558e2b2623306a9d81f88a12e8ae7090a86c12f1da
      policies:
        - decision: allow
          rules:
            aud: urn:pulumi:org:service-provider-test-org
            sub: pulumi:deploy:org:myTestOrg:project:myTestProject:*
          userLogin: pulumipus
          tokenType: personal
# A Github OIDC Issuer with all types of policies and TLS certificate thumbprint
  github_issuer:
    type: pulumiservice:index:OidcIssuer
    properties:
      organization: service-provider-test-org
      name: github_issuer
      url: https://token.actions.githubusercontent.com
      thumbprints:
        - 39517789ff0132a9212bafea4dc37401eae58b1bfac9756109d14301c90a6ab5
      policies:
        - decision: deny
          rules:
            aud: urn:pulumi:org:service-provider-test-org
            sub: repo:organization/repo:*
          userLogin: pulumipus
          tokenType: personal
        - decision: allow
          rules:
            aud: urn:pulumi:org:service-provider-test-org
            sub: repo:organization/repo:*
          authorizedPermissions:
            - admin
          tokenType: organization
        - decision: deny
          rules:
            aud: urn:pulumi:org:service-provider-test-org
            sub: repo:organization/repo:*
          teamName: dream-team
          tokenType: team