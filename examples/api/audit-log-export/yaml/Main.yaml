# AuditLogExportConfiguration streams the org's audit log to an S3 bucket.
# Real exports require valid AWS credentials in the bucket's role; this
# example uses placeholder values for preview/compile validation only.
resources:
  exportConfig:
    type: pulumiservice:api:AuditLogExportConfiguration
    properties:
      orgName: ${organizationName}
      newEnabled: true
      newS3Configuration:
        s3BucketName: ${bucketName}
        iamRoleArn: arn:aws:iam::123456789012:role/PulumiAuditLogExportRole
outputs:
  exportEnabled: ${exportConfig.enabled}
