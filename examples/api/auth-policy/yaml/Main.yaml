# AuthPolicy installs an org-wide auth policy. The `policies` field is a
# list of scoped permission rules. This example sets a "deny" baseline,
# overriding to allow members read access to the org. policyId scopes the
# policy to either the org root ("org") or a child issuer.
resources:
  policy:
    type: pulumiservice:api/auth:Policy
    properties:
      orgName: ${organizationName}
      policyId: ${policyId}
      policies:
        - decision: allow
          authorizedPermissions:
            - read
          tokenType: organization
          rules: {}
        - decision: deny
          authorizedPermissions:
            - admin
          tokenType: organization
          rules: {}
