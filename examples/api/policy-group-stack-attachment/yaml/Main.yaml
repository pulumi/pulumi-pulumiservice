# PolicyGroupStackAttachment is a generated attachment resource: one membership
# edge (a stack in a policy group) modeled as its own resource. Create calls
# addStack, Delete calls removeStack, and Read checks the group's `stacks` list
# — all derived from the UpdatePolicyGroup body's addStack/removeStack pair by
# scaffold-metadata, with no hand-written resource. Attaching N stacks is N of
# these (or a loop), instead of a declarative array on the group.
resources:
  exampleStack:
    type: pulumiservice:api/stacks:Stack
    properties:
      orgName: ${organizationName}
      projectName: ${projectName}
      stackName: ${stackName}
  group:
    type: pulumiservice:api:PolicyGroup
    properties:
      orgName: ${organizationName}
      name: ${groupName}
      entityType: stacks
  attachment:
    type: pulumiservice:api:PolicyGroupStackAttachment
    properties:
      orgName: ${organizationName}
      policyGroup: ${group.name}
      # AppPulumiStackReference: name is the stack, routingProject the project.
      name: ${exampleStack.stackName}
      routingProject: ${projectName}
    options:
      dependsOn:
        - ${group}
        - ${exampleStack}
outputs:
  attachedStack: ${attachment.name}
