# Insights Accounts back the Pulumi Insights cloud-resource scanner. The
# `environment` value points at an ESC environment that opens AWS/GCP/Azure
# credentials at scan time. Real scans need real credentials there; this
# example uses a placeholder so it compiles and previews cleanly.
resources:
  account:
    type: pulumiservice:api/insights:Account
    properties:
      orgName: ${organizationName}
      accountName: api-insights-${accountSuffix}
      provider: aws
      environment: ${insightsEnvironment}
      scanSchedule: none
  scanSettings:
    type: pulumiservice:api/insights:ScheduledScanSettings
    properties:
      orgName: ${organizationName}
      # accountName is an input (program-owned); reference the source
      # value rather than the resource. The Account state surfaces the
      # account under `name` on the cloud-owned side.
      accountName: api-insights-${accountSuffix}
      paused: true
      scheduleCron: 0 6 * * *
    options:
      dependsOn:
        - ${account}
outputs:
  accountName: ${account.name}
