name: pulumicloud-api-service-catalog-demo
runtime: yaml
description: |
  Service Catalog api demo — provisions an owner team, three placeholder
  stacks, and three catalog entries (checkout-api, search-frontend,
  notification-worker) wired together with realistic owner / tier /
  oncall metadata. The catalog is a api-only resource surface; no api
  pulumiservice resource models org-wide service catalog entries.
config:
  organizationName:
    type: string
    default: service-provider-test-org
  nameSuffix:
    type: string
    default: demo
