resources:
  team:
    type: pulumiservice:api/teams:Team
    properties:
      orgName: ${organizationName}
      name: api-tokens-team-${tokenSuffix}
      displayName: api Tokens Team ${tokenSuffix}
      description: Owner team for the api access-tokens example
  orgToken:
    type: pulumiservice:api/tokens:OrgToken
    properties:
      orgName: ${organizationName}
      name: api-org-token-${tokenSuffix}
      description: ${tokenDescription}
      admin: false
      expires: 0
  teamToken:
    type: pulumiservice:api/tokens:TeamToken
    properties:
      orgName: ${organizationName}
      teamName: ${team.name}
      name: api-team-token-${tokenSuffix}
      description: ${tokenDescription}
      expires: 0
  personalToken:
    type: pulumiservice:api/tokens:PersonalToken
    properties:
      description: ${tokenDescription}
      expires: 0
outputs:
  orgTokenId: ${orgToken.tokenId}
  teamTokenId: ${teamToken.tokenId}
