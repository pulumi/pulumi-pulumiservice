resources:
  environment:
    type: pulumiservice:api/esc:Environment
    properties:
      orgName: ${organizationName}
      project: ${projectName}
      name: testing-environment-${envSuffix}
  # EnvironmentTag: user-defined key/value label on the environment.
  environmentTag:
    type: pulumiservice:api/esc:EnvironmentTag
    properties:
      orgName: ${organizationName}
      projectName: ${projectName}
      envName: testing-environment-${envSuffix}
      name: purpose
      value: ${tagValue}
    options:
      dependsOn:
        - ${environment}
# Note: pulumiservice:api/esc:RevisionTag isn't covered here because tagging
# requires an existing revision, and a freshly-created environment has
# no definition (and therefore no revisions). To exercise tags we'd
# first need to push a definition via the Open/Update flow, which is
# out of scope for these api examples.
outputs:
  # esc:Environment exposes only id/urn — path-param inputs (orgName,
  # project, name) follow the program-owns-inputs / cloud-owns-outputs
  # disjointness; recover them from the slash-joined id if needed.
  environmentId: ${environment.id}
  # Server-echoed tag value.
  environmentTagValue: ${environmentTag.value}
