# A consolidated example showing the toggles available on each
# org-installed VCS integration. Each integration is identified by a
# stable integrationId path-parameter — the actual OAuth setup happens
# out-of-band via the Pulumi Cloud UI; this resource owns Pulumi-managed
# behavior flags (PR comments, code-access for review previews, etc.).
resources:
  github:
    type: pulumiservice:api/integrations:GitHubIntegration
    properties:
      orgName: ${organizationName}
      integrationId: ${githubIntegrationId}
      disablePRComments: false
      disableDetailedDiff: false
      disableNeoSummaries: false
      disableCodeAccessForReviews: false
  githubEnterprise:
    type: pulumiservice:api/integrations:GitHubEnterpriseIntegration
    properties:
      orgName: ${organizationName}
      integrationId: ${githubEnterpriseIntegrationId}
      disablePRComments: true
      disableDetailedDiff: false
      disableNeoSummaries: false
      disableCodeAccessForReviews: true
  gitlab:
    type: pulumiservice:api/integrations:GitLabIntegration
    properties:
      orgName: ${organizationName}
      integrationId: ${gitlabIntegrationId}
      disablePRComments: false
      disableDetailedDiff: false
      disableNeoSummaries: true
  bitbucket:
    type: pulumiservice:api/integrations:BitBucketIntegration
    properties:
      orgName: ${organizationName}
      integrationId: ${bitbucketIntegrationId}
      disablePRComments: false
      disableDetailedDiff: false
      disableNeoSummaries: false
  azureDevOps:
    type: pulumiservice:api/integrations:AzureDevOpsIntegration
    properties:
      orgName: ${organizationName}
      integrationId: ${azureDevOpsIntegrationId}
      disablePRComments: true
      disableDetailedDiff: true
      disableNeoSummaries: true
