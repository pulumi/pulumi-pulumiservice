# Service registers an org-wide service catalog entry. Owners reference
# either a team or user; items list the stacks/components that compose
# the service.
resources:
  catalogService:
    type: pulumiservice:api/services:Service
    properties:
      orgName: ${organizationName}
      name: api-service-${serviceSuffix}
      description: An example api service catalog entry.
      ownerType: team
      ownerName: platform
      items:
        - type: stack
          name: service-provider-test-org/example-app/dev
      properties:
        - key: tier
          value: gold
          type: string
          order: 1
        - key: oncall
          value: platform-ops
          type: string
          order: 2
