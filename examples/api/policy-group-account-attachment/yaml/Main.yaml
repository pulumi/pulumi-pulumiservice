# PolicyGroupInsightsAccountAttachment is the account analogue of the stack
# attachment — and, like it, fully generated by scaffold-metadata from the spec
# (no hand-written metadata). It comes from the generator's scalar-membership
# rule: the membership list `accounts` is typed as bare strings, so the edge is
# identified by the account `name` (addInsightsAccount/removeInsightsAccount).
#
# Preview-only: real Insights account creation needs cloud credentials in the
# referenced ESC environment.
resources:
  account:
    type: pulumiservice:api/insights:Account
    properties:
      orgName: ${organizationName}
      accountName: api-pg-acct-${accountSuffix}
      provider: aws
      environment: ${insightsEnvironment}
      scanSchedule: none
  group:
    type: pulumiservice:api:PolicyGroup
    properties:
      orgName: ${organizationName}
      name: ${groupName}
      entityType: accounts
  attachment:
    type: pulumiservice:api:PolicyGroupInsightsAccountAttachment
    properties:
      orgName: ${organizationName}
      policyGroup: ${group.name}
      # The edge is just the account name.
      name: ${account.name}
    options:
      dependsOn:
        - ${group}
        - ${account}
outputs:
  attachedAccount: ${attachment.name}
