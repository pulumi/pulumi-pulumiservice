resources:
  exampleStack:
    type: pulumiservice:v2/stacks:Stack
    properties:
      orgName: ${organizationName}
      projectName: ${projectName}
      stackName: ${stackName}
      tags:
        owner: pulumicloud-v2-example
        purpose: ${stackPurpose}
outputs:
  stackName: ${exampleStack.stackName}
