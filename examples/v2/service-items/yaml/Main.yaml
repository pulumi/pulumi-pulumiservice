# services:Item is a separate resource from services:Service: an Item is
# an addendum that AddServiceItems-es into an existing Service. Modeling
# it as its own resource (rather than baking items into Service) lets
# users express "this stack belongs to that service" with normal
# IaC dependency tracking.
#
# Preview-only: the items reference real stacks the test org doesn't own
# in the local backend. The example validates that the program compiles
# and that the v2 dispatch resolves both type tokens.
variables:
  serviceNameValue: v2-svc-items-${serviceSuffix}
resources:
  catalogService:
    type: pulumiservice:v2/services:Service
    properties:
      orgName: ${serviceOrg}
      name: ${serviceNameValue}
      description: Service for the service-items example.
      ownerType: ${ownerType}
      ownerName: ${ownerName}
      items:
        - kind: stack
          ref: ${serviceOrg}/example-app/dev
      properties:
        - key: tier
          value: gold
  extraItem:
    type: pulumiservice:v2/services:Item
    properties:
      orgName: ${serviceOrg}
      ownerType: ${ownerType}
      ownerName: ${ownerName}
      # serviceName is an input (program-owned); reuse the source value.
      serviceName: ${serviceNameValue}
      items:
        - kind: stack
          ref: ${serviceOrg}/example-app/staging
    options:
      dependsOn:
        - ${catalogService}
