# Task is the agent task definition (used by Pulumi Deployments). It runs
# on an AgentPool, so we provision a pool first. The taskID path-parameter
# identifies an existing definition; this example uses a placeholder so
# the program previews cleanly.
resources:
  pool:
    type: pulumiservice:v2:AgentPool
    properties:
      orgName: ${serviceOrg}
      name: v2-task-pool-${taskSuffix}
      description: Pool used by the v2 task example
  task:
    type: pulumiservice:v2:Task
    properties:
      orgName: ${serviceOrg}
      taskID: ${taskID}
      name: v2-task-${taskSuffix}
      approvalMode: manual
      permissionMode: maintainer
      isShared: false
outputs:
  poolName: ${pool.name}
