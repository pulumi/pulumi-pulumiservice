resources:
  environment:
    type: pulumiservice:v2/esc:Environment
    properties:
      orgName: ${organizationName}
      project: ${projectName}
      name: ${envName}
  schedule:
    type: pulumiservice:v2/esc:EnvironmentSchedule
    properties:
      orgName: ${organizationName}
      projectName: ${projectName}
      envName: ${envName}
      scheduleCron: ${scheduleCron}
    options:
      dependsOn:
        - ${environment}
outputs:
  environmentId: ${environment.id}
  scheduleId: ${schedule.id}
