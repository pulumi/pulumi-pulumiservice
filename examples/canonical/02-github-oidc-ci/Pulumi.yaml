name: pulumiservice-canonical-02-github-oidc-ci
runtime: yaml
description: GitHub Actions → Pulumi Cloud OIDC trust. Removes long-lived Pulumi access tokens from CI; full notes in README.

config:
  organizationName:
    type: string
    default: service-provider-test-org
  # The GitHub repo(s) that should be trusted to deploy. Use a wildcard
  # sparingly — `repo:acme/*` is a standing invitation to every repo in
  # your org; better to enumerate explicitly.
  trustedRepositories:
    type: array
    items:
      type: string
    default:
      - "repo:acme-corp/infrastructure:ref:refs/heads/main"
      - "repo:acme-corp/platform:environment:production"

resources:
  # OIDC issuer: tells Pulumi Cloud "trust tokens minted by GitHub that
  # claim one of these subjects."
  githubActions:
    type: pulumiservice:orgs/oidc:Issuer
    properties:
      organization: ${organizationName}
      name: github-actions
      url: https://token.actions.githubusercontent.com
      # thumbprints omitted — Pulumi Cloud auto-derives SHA256
      # thumbprints from the issuer's TLS chain. Override only when
      # you're pinning to a specific cert (rare).
      policies:
        # Token minting rules: each rule grants specific Pulumi permissions
        # to GitHub workflows whose OIDC claims match the filter.
        - decision: allow
          tokenType: team
          teamName: deployers
          rules:
            sub:
              operator: in
              values: ${trustedRepositories}

outputs:
  issuerUrl:
    value: ${githubActions.url}
  issuerId:
    value: ${githubActions.issuerId}
