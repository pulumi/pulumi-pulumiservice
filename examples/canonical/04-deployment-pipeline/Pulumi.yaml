name: pulumiservice-canonical-04-deployment-pipeline
runtime: yaml
description: Pulumi Deployments pipeline — git previews, drift detection, TTL on ephemeral envs. See README for the GitOps pattern.

config:
  organizationName:
    type: string
    default: service-provider-test-org
  project:
    type: string
    default: infrastructure
  stack:
    type: string
    default: production
  digits:
    type: string
    default: "00000"

resources:
  # Register the stack first — the deployment-settings, drift-schedule
  # and TTL-schedule resources all attach to an existing stack record
  # in Pulumi Cloud, so we have to create it before we can configure it.
  productionStack:
    type: pulumiservice:stacks:Stack
    properties:
      organizationName: ${organizationName}
      projectName: ${project}
      stackName: ${stack}-${digits}

  # Deployment settings — wires the stack to a git repo, CI image, and
  # execution context. Without this, nothing is automated.
  deploymentSettings:
    type: pulumiservice:stacks/deployments:Settings
    properties:
      organization: ${productionStack.organizationName}
      project: ${productionStack.projectName}
      stack: ${productionStack.stackName}
      sourceContext:
        git:
          repoUrl: https://github.com/pulumi/templates.git
          branch: master
      # In production add a `github:` block tying this stack to a GitHub
      # repository (deployCommits / previewPullRequests / pullRequestTemplate)
      # so PRs auto-preview and main-branch commits auto-deploy. Skipped here
      # because it requires the Pulumi GitHub app installed on the target repo.
      executorContext:
        executorImage:
          image: pulumi/pulumi:latest
      operationContext:
        preRunCommands:
          - "npm ci"
        environmentVariables:
          NODE_ENV: production

  # Drift detection every 6 hours — if someone clicks around in the AWS
  # console, we notice and (optionally) remediate on a schedule.
  driftCheck:
    type: pulumiservice:stacks/deployments:DriftSchedule
    properties:
      organization: ${productionStack.organizationName}
      project: ${productionStack.projectName}
      stack: ${productionStack.stackName}
      scheduleCron: "0 */6 * * *"
      autoRemediate: false           # notify-only; flip to true with care

  # TTL for ephemeral preview stacks so they don't pile up after PRs merge.
  ephemeralTtl:
    type: pulumiservice:stacks/deployments:TtlSchedule
    properties:
      organization: ${productionStack.organizationName}
      project: ${productionStack.projectName}
      stack: ${productionStack.stackName}
      timestamp: "2026-12-31T00:00:00Z"
      deleteAfterDestroy: true
