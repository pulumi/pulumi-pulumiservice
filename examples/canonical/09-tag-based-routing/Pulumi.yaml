name: pulumiservice-canonical-09-tag-based-routing
runtime: yaml
description: |
  Stack tags + per-tag webhooks. Events from production stacks go to the
  on-call PagerDuty service; events from dev stacks go to a quiet Slack
  channel. The canonical pattern for not waking engineers up over dev
  stack drift.

config:
  organizationName:
    type: string
    default: service-provider-test-org
  project:
    type: string
    default: infrastructure
  stack:
    type: string
    default: production
  pagerdutyUrl:
    type: string
    secret: true
  slackDevUrl:
    type: string
    secret: true

resources:
  # Batch tag set — one resource manages the whole map, and delete
  # iterates per tag key (exercises the iterateOver primitive). Tags
  # drive downstream routing: webhooks, policies, and change gates all
  # match on tags.
  stackTags:
    type: pulumiservice:stacks/tags:Tags
    properties:
      organization: ${organizationName}
      project: ${project}
      stack: ${stack}
      tags:
        environment: production
        criticality: tier-1
        owner: platform-team

  # Production-tier webhook — subscribes to failure events on the prod
  # stack. Demonstrates the stack-scoped variant of the polymorphic
  # Webhook (stackName + projectName selecting the stack-hooks endpoint).
  productionAlerts:
    type: pulumiservice:stacks/hooks:Webhook
    properties:
      organizationName: ${organizationName}
      projectName: ${project}
      stackName: ${stack}
      displayName: pagerduty-prod
      payloadUrl: ${pagerdutyUrl}
      secret: ${pagerdutyUrl}
      format: raw
      filters:
        - stack_update_failed
        - stack_drift_detected
        - deployment_failed
      active: true

  # Dev-tier webhook — same shape, different stack, different filter set.
  # Deliberately does NOT subscribe to "failed" events — dev stacks
  # failing is not a 3am alert.
  devNotifications:
    type: pulumiservice:stacks/hooks:Webhook
    properties:
      organizationName: ${organizationName}
      projectName: ${project}
      stackName: dev      # different stack, same project
      displayName: slack-dev
      payloadUrl: ${slackDevUrl}
      secret: ${slackDevUrl}
      format: slack
      filters:
        - stack_update_succeeded
        - stack_update_failed
      active: true
