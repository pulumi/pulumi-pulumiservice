name: pulumiservice-canonical-09-tag-based-routing
runtime: yaml
description: Stack tags + per-tag webhooks routing prod alerts to PagerDuty and dev notifications to Slack. See README for the routing pattern.

config:
  organizationName:
    type: string
    default: service-provider-test-org
  digits:
    type: string
    default: "00000"
  pagerdutyUrl:
    type: string
    default: https://example.com/pagerduty-webhook-placeholder
  slackDevUrl:
    type: string
    default: https://example.com/slack-dev-webhook-placeholder

resources:
  # Register the prod and dev stacks so we have something to attach
  # tags + webhooks to. (Real programs typically reference stacks
  # created elsewhere; we create them inline so the example is
  # self-contained.)
  prodStack:
    type: pulumiservice:stacks:Stack
    properties:
      organizationName: ${organizationName}
      projectName: infrastructure-${digits}
      stackName: production

  devStack:
    type: pulumiservice:stacks:Stack
    properties:
      organizationName: ${organizationName}
      projectName: infrastructure-${digits}
      stackName: dev

  # Batch tag set — one resource manages the whole map, and delete
  # iterates per tag key (exercises the iterateOver primitive). Tags
  # drive downstream routing: webhooks, policies, and change gates all
  # match on tags.
  stackTags:
    type: pulumiservice:stacks/tags:Tags
    properties:
      organization: ${prodStack.organizationName}
      project: ${prodStack.projectName}
      stack: ${prodStack.stackName}
      tags:
        environment: production
        criticality: tier-1
        owner: platform-team

  # Production-tier webhook — subscribes to failure events on the prod
  # stack. Demonstrates the stack-scoped variant of the polymorphic
  # Webhook (stackName + projectName selecting the stack-hooks endpoint).
  productionAlerts:
    type: pulumiservice:stacks/hooks:Webhook
    properties:
      organizationName: ${prodStack.organizationName}
      projectName: ${prodStack.projectName}
      stackName: ${prodStack.stackName}
      displayName: pagerduty-prod-${digits}
      payloadUrl: ${pagerdutyUrl}
      format: raw
      active: true

  # Dev-tier webhook — same shape, different stack, different filter set.
  # Deliberately does NOT subscribe to "failed" events — dev stacks
  # failing is not a 3am alert.
  devNotifications:
    type: pulumiservice:stacks/hooks:Webhook
    properties:
      organizationName: ${devStack.organizationName}
      projectName: ${devStack.projectName}
      stackName: ${devStack.stackName}
      displayName: slack-dev-${digits}
      payloadUrl: ${slackDevUrl}
      format: raw
      active: true
