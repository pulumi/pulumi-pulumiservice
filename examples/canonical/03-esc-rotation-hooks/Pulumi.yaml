name: pulumiservice-canonical-03-esc-rotation-hooks
runtime: yaml
description: ESC environment with cron-rotated password and a Slack webhook on rotation. See README for the "secrets in motion" pattern.

config:
  organizationName:
    type: string
    default: service-provider-test-org
  digits:
    type: string
    default: "00000"
  slackWebhookUrl:
    type: string
    # In production, override via `pulumi config set --secret slackWebhookUrl`
    # so the value is encrypted in state. Default here is a non-secret
    # placeholder so the example deploys cleanly without setup.
    default: https://example.com/slack-webhook-placeholder

resources:
  productionSecrets:
    type: pulumiservice:esc:Environment
    properties:
      organization: ${organizationName}
      project: platform
      name: production-secrets-${digits}
      yaml: |
        values:
          # In production, replace this static placeholder with a
          # rotator (e.g. `fn::rotate::awsSecretsManager`) — requires
          # the matching AWS / Vault / etc. integration installed in
          # the org. Static value here so the example deploys against
          # any backend.
          database:
            password: rotate-me-via-fn-rotate

  # Production deployments add a `Rotation` here:
  #
  #   dailyRotation:
  #     type: pulumiservice:esc/schedules:Rotation
  #     properties:
  #       organization: ${productionSecrets.organization}
  #       project: ${productionSecrets.project}
  #       environment: ${productionSecrets.name}
  #       scheduleCron: "0 3 * * *"   # 03:00 UTC daily
  #       secretRotationRequest:
  #         environmentPath: database.password
  #
  # Requires the `secret rotation` feature to be enabled on the org
  # and at least one rotated secret in the environment. Skipped here
  # so the example deploys against any backend.

  # Notification: ESC-scoped webhook (Webhook with environmentName +
  # projectName set — no stackName).
  rotationNotifier:
    type: pulumiservice:stacks/hooks:Webhook
    properties:
      organizationName: ${productionSecrets.organization}
      projectName: ${productionSecrets.project}
      environmentName: ${productionSecrets.name}
      displayName: slack-rotation-alerts-${digits}
      payloadUrl: ${slackWebhookUrl}
      # In production, format: slack with a real https://hooks.slack.com/...
      # URL. We use `raw` and a generic URL here so the example deploys
      # against any backend (the API validates Slack-format URLs more
      # strictly).
      format: raw
      active: true

  # Team allowed to read the environment (and its decrypted secrets).
  # Useful when a service team owns an env shared with sibling services'
  # CI; only the owning team can edit, but readers can `esc env open`.
  secretsReadersTeam:
    type: pulumiservice:orgs/teams:Team
    properties:
      organizationName: ${organizationName}
      teamType: pulumi
      name: secrets-readers-${digits}
      displayName: Secrets readers (canonical/03)
      description: Read access to production-secrets ESC env. Used by sibling-service CI.

  secretsReadersGrant:
    type: pulumiservice:esc/permissions:TeamEnvironmentPermission
    properties:
      organizationName: ${organizationName}
      teamName: ${secretsReadersTeam.name}
      projectName: ${productionSecrets.project}
      envName: ${productionSecrets.name}
      permission: read

outputs:
  environmentRef:
    value: "${productionSecrets.organization}/${productionSecrets.project}/${productionSecrets.name}"
