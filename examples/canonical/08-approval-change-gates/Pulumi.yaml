name: pulumiservice-canonical-08-approval-change-gates
runtime: yaml
description: Production deployments gated behind a human approval. Canonical pattern for regulated workloads (SOX, PCI, HIPAA). See README.

config:
  organizationName:
    type: string
    default: service-provider-test-org
  digits:
    type: string
    default: "00000"

resources:
  # The ESC environment the gate protects. In practice this is the
  # production secrets environment — every deployment that opens it
  # creates a change request.
  productionEnv:
    type: pulumiservice:esc:Environment
    properties:
      organization: ${organizationName}
      project: production-${digits}
      name: default
      yaml: |
        values:
          gate-target: placeholder

  # The team whose members can approve production changes. Per SOX, this
  # must be distinct from the team that authors them.
  approvers:
    type: pulumiservice:orgs/teams:Team
    properties:
      organizationName: ${organizationName}
      teamType: pulumi
      name: change-approvers-${digits}
      displayName: Production Change Approvers
      description: |
        Can approve/reject production change requests. Must NOT overlap
        with production-deployers membership (segregation of duties).

  # The gate itself. The shapes under `environmentIdentifier` and
  # `approvalRuleConfig` pass through to Pulumi Cloud unchanged —
  # v2.0.0-alpha keeps them loose so the gate schema can evolve
  # independently; tighter typing is tracked as follow-up work.
  productionGate:
    type: pulumiservice:changegates:ApprovalRule
    properties:
      organizationName: ${organizationName}
      name: production-deploys
      enabled: true
      target:
        entityType: environment
        qualifiedName: ${productionEnv.project}/${productionEnv.name}
        actionTypes:
          - update
      rule:
        ruleType: approval_required
        numApprovalsRequired: 1
        allowSelfApproval: false
        requireReapprovalOnChange: true
        eligibleApprovers:
          - eligibilityType: team_member
            teamName: ${approvers.name}
