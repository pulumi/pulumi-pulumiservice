name: pulumiservice-canonical-05-audit-log-export
runtime: yaml
description: |
  Configure Pulumi Cloud to stream the organization audit log to an S3
  bucket continuously. Every admin action (token creation, team membership
  change, policy group update, stack delete, …) lands in your SIEM/compliance
  pipeline without a human in the loop.

  Required for SOC 2, ISO 27001, HIPAA, and similar compliance frameworks.

config:
  organizationName:
    type: string
    default: service-provider-test-org
  exportBucket:
    type: string
    default: acme-corp-pulumi-audit-logs
  exportRoleArn:
    type: string
    # Should have s3:PutObject on the bucket; trust policy allows the
    # Pulumi Cloud audit-log exporter to assume it.
    default: arn:aws:iam::123456789012:role/PulumiAuditLogExporter

resources:
  # The LogExport resource is a singleton per organization — there is at
  # most one audit-log export configuration. Setting `enabled: false`
  # pauses the stream without tearing down the destination config.
  auditExport:
    type: pulumiservice:orgs/audit:LogExport
    properties:
      organizationName: ${organizationName}
      enabled: true
      # S3 destination. The shape here passes through to Pulumi Cloud,
      # which writes newline-delimited JSON under the given prefix using
      # the assumed IAM role.
      s3Configuration:
        iamRoleArn: ${exportRoleArn}
        s3BucketName: ${exportBucket}
        s3PathPrefix: pulumi-audit/

outputs:
  exportConfigId:
    value: ${auditExport.id}
  verifyWith:
    value: "pulumi org audit-log-export test ${organizationName}"
