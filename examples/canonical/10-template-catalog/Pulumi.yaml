name: pulumiservice-canonical-10-template-catalog
runtime: yaml
description: |
  Register a git-hosted catalog of internal templates so developers
  can `pulumi new` from your curated set instead of copy-pasting
  from the wiki. New services come online consistent by default.

  The canonical "golden path" setup for platform engineering teams.

config:
  organizationName:
    type: string
    default: service-provider-test-org

resources:
  # The template source: points Pulumi Cloud at a git repo of template
  # directories. Each subdir in the repo becomes a template the org can
  # `pulumi new` from (discovery is git-driven; no per-template entries
  # here). The source URL must be reachable by Pulumi Cloud.
  internalCatalog:
    type: pulumiservice:orgs/templates:Source
    properties:
      organizationName: ${organizationName}
      sourceName: acme-golden-path
      sourceURL: https://github.com/acme-corp/pulumi-templates.git

outputs:
  templateId:
    value: ${internalCatalog.templateId}
  catalogUrl:
    value: "https://app.pulumi.com/${organizationName}/templates/${internalCatalog.sourceName}"
  usage:
    value: "pulumi new ${organizationName}/${internalCatalog.sourceName}/typescript-microservice"
