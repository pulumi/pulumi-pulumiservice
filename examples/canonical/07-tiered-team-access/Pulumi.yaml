name: pulumiservice-canonical-07-tiered-team-access
runtime: yaml
description: Three teams, three permission tiers, two stacks — canonical RBAC for teams larger than "everyone trusts everyone." See README.

config:
  organizationName:
    type: string
    default: service-provider-test-org
  digits:
    type: string
    default: "00000"

variables:
  # Pulumi Cloud's team-stack permission levels (see TeamStackPermission):
  # 0 = none, 101 = read, 102 = edit, 103 = admin.
  permNone: 0
  permRead: 101
  permEdit: 102
  permAdmin: 103

resources:
  # ── Stacks (created here so the example deploys against a fresh
  # org; in practice these stacks are typically created by other
  # Pulumi programs and just referenced here) ─────────────────────────
  platformStack:
    type: pulumiservice:stacks:Stack
    properties:
      organizationName: ${organizationName}
      projectName: platform-${digits}
      stackName: prod

  billingStack:
    type: pulumiservice:stacks:Stack
    properties:
      organizationName: ${organizationName}
      projectName: billing-service-${digits}
      stackName: prod

  # ── Teams ────────────────────────────────────────────────────────────
  platformAdmins:
    type: pulumiservice:orgs/teams:Team
    properties:
      organizationName: ${organizationName}
      teamType: pulumi
      name: platform-admins-${digits}
      displayName: Platform Admins
      description: Break-glass access to everything. Keep small.

  billingOwners:
    type: pulumiservice:orgs/teams:Team
    properties:
      organizationName: ${organizationName}
      teamType: pulumi
      name: billing-owners-${digits}
      displayName: Billing Service Owners
      description: Owns the billing service stacks end-to-end.

  developers:
    type: pulumiservice:orgs/teams:Team
    properties:
      organizationName: ${organizationName}
      teamType: pulumi
      name: developers-${digits}
      displayName: Developers (all)
      description: Read everything; deploy nothing without an explicit grant.

  # ── Platform stack permissions ───────────────────────────────────────
  platformAdminPerm:
    type: pulumiservice:stacks/permissions:TeamStackPermission
    properties:
      organization: ${organizationName}
      project: ${platformStack.projectName}
      stack: ${platformStack.stackName}
      team: ${platformAdmins.name}
      permission: ${permAdmin}

  platformDevRead:
    type: pulumiservice:stacks/permissions:TeamStackPermission
    properties:
      organization: ${organizationName}
      project: ${platformStack.projectName}
      stack: ${platformStack.stackName}
      team: ${developers.name}
      permission: ${permRead}

  # ── Billing stack permissions ────────────────────────────────────────
  billingAdminPerm:
    type: pulumiservice:stacks/permissions:TeamStackPermission
    properties:
      organization: ${organizationName}
      project: ${billingStack.projectName}
      stack: ${billingStack.stackName}
      team: ${platformAdmins.name}
      permission: ${permAdmin}

  billingOwnerPerm:
    type: pulumiservice:stacks/permissions:TeamStackPermission
    properties:
      organization: ${organizationName}
      project: ${billingStack.projectName}
      stack: ${billingStack.stackName}
      team: ${billingOwners.name}
      permission: ${permEdit}    # deploy, not admin — admins change permissions

  billingDevRead:
    type: pulumiservice:stacks/permissions:TeamStackPermission
    properties:
      organization: ${organizationName}
      project: ${billingStack.projectName}
      stack: ${billingStack.stackName}
      team: ${developers.name}
      permission: ${permRead}
