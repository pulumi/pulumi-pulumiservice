name: pulumiservice-canonical-12-saml-team-sync
runtime: yaml
description: |
  Provision Pulumi teams that mirror the structure of your IdP (Okta,
  Azure AD, Google Workspace) groups. Group-membership sync itself is
  configured in the Pulumi Cloud admin UI under SSO → SAML Group
  Mappings — there is no API resource for the mapping today; this
  program just creates the *target* teams that the IdP-side mapping
  points at.

  The canonical pattern for organizations that already have a corporate
  IdP and want "who has what in Pulumi?" answered by their existing IAM
  audit pipeline.

config:
  organizationName:
    type: string
    default: service-provider-test-org

resources:
  # Teams that an upstream SAML group mapping populates. Names here
  # should match the group mappings configured in the Pulumi Cloud
  # admin console (SSO → SAML → Group Mappings). Membership itself is
  # reconciled on each user's login based on the SAML assertion.
  platformTeam:
    type: pulumiservice:orgs/teams:Team
    properties:
      organizationName: ${organizationName}
      teamType: pulumi
      name: platform
      displayName: Platform Engineering
      description: Mirrors Okta group "Platform Engineering".

  securityTeam:
    type: pulumiservice:orgs/teams:Team
    properties:
      organizationName: ${organizationName}
      teamType: pulumi
      name: security
      displayName: Security Engineering
      description: Mirrors Okta group "Security Engineering".

  developersTeam:
    type: pulumiservice:orgs/teams:Team
    properties:
      organizationName: ${organizationName}
      teamType: pulumi
      name: developers
      displayName: All Engineering
      description: Mirrors Okta group "All Engineers" — read-only baseline.
