name: yaml-rbac
runtime: yaml
description: Exercises the RBAC resources and data sources.

config:
  organizationName:
    type: string
    default: service-provider-test-org
  digits:
    type: string

resources:
  # A custom organization-level role that grants stack read access.
  readOnlyRole:
    type: pulumiservice:OrganizationRole
    properties:
      organizationName: ${organizationName}
      name: yaml-rbac-read-only-${digits}
      description: Read-only access to stacks, created by the yaml-rbac example.
      permissions:
        kind: allow
        permissions:
          - stack:read

  # A team that will receive the custom role. Pulumi Cloud adds the team
  # creator as the first member automatically, so we declare them here to
  # keep refresh from detecting that as drift.
  rbacTeam:
    type: pulumiservice:Team
    properties:
      organizationName: ${organizationName}
      name: yaml-rbac-team-${digits}
      teamType: pulumi
      displayName: yaml-rbac team (${digits})
      description: Team created by the yaml-rbac example.
      members:
        - ${currentUser.username}

  # Assign the custom role to the team. The team's organization must have
  # the custom-roles feature enabled.
  rbacTeamRoleBinding:
    type: pulumiservice:TeamRoleAssignment
    properties:
      organizationName: ${organizationName}
      teamName: ${rbacTeam.name}
      roleId: ${readOnlyRole.roleId}

  # Exercise OrganizationMember via adoption: the user already exists in
  # the org, so Create hits 409 → adopts the membership (adopted=true),
  # then assigns the custom role. Destroy is a no-op for adopted
  # memberships; destroying readOnlyRole above (force=true) revokes the
  # assignment, restoring the user to their org-default role.
  rbacMember:
    type: pulumiservice:OrganizationMember
    properties:
      organizationName: ${organizationName}
      username: service-provider-example-user
      roleId: ${readOnlyRole.roleId}

  # An ESC environment to demo per-env role scoping. The Environment
  # resource exposes its UUID via `environmentId`, which is what the
  # role below pins its grants to.
  scopedEnv:
    type: pulumiservice:Environment
    properties:
      organization: ${organizationName}
      project: default
      name: yaml-rbac-scoped-env-${digits}
      yaml:
        fn::stringAsset: |-
          values:
            placeholder: "yaml-rbac scoped env fixture"

  # A role that ONLY grants `environment:read` and `environment:open` on
  # the specific env created above — anywhere else in the org, the role
  # grants nothing. This is the shape Pulumi Cloud's role evaluator
  # expects (condition wrapping the per-env literal):
  # the role definition itself is org-scoped (resourceType defaults to
  # `global`), but the permission tree is gated on the environment ID.
  scopedReadOnlyRole:
    type: pulumiservice:OrganizationRole
    properties:
      organizationName: ${organizationName}
      name: yaml-rbac-scoped-read-only-${digits}
      description: Read+open access scoped to a single ESC environment.
      permissions:
        kind: group
        entries:
          - kind: condition
            condition:
              kind: equal
              left:
                kind: expressionEnvironment
              right:
                kind: literalEnvironment
                identity: ${scopedEnv.environmentId}
            subNode:
              kind: allow
              permissions:
                - environment:read
                - environment:open

variables:
  # Data source: the authenticated Pulumi Cloud user (the stack's operator).
  # Used to seed the new Team's member list below.
  currentUser:
    fn::invoke:
      function: pulumiservice:getCurrentUser
  # Data source: list every member of the organization.
  currentMembers:
    fn::invoke:
      function: pulumiservice:getOrganizationMembers
      arguments:
        organizationName: ${organizationName}
  # Data source: discover the permission-scope catalogue. Customers use this
  # to find the valid scope names to put in OrganizationRole.permissions.
  availableScopes:
    fn::invoke:
      function: pulumiservice:getOrganizationRoleScopes
      arguments:
        organizationName: ${organizationName}

outputs:
  roleId: ${readOnlyRole.roleId}
  roleVersion: ${readOnlyRole.version}
  assignedRoleName: ${rbacTeamRoleBinding.roleName}
  firstMember: ${currentMembers.members[0].username}
  firstScope: ${availableScopes.scopes[0].name}
  memberAdopted: ${rbacMember.adopted}
  memberAssignedRole: ${rbacMember.roleName}
  # Demonstrate the env-scoped role wiring: the env's UUID flows into
  # the role's permission tree, so the test can verify both pieces line up.
  scopedEnvironmentId: ${scopedEnv.environmentId}
  scopedRoleId: ${scopedReadOnlyRole.roleId}
