name: yaml-rbac
runtime: yaml
description: |
  Exercises the fine-grained RBAC resources: OrganizationRole (custom role
  definition), OrganizationMember (user membership + role assignment), and
  TeamRoleAssignment (assigning a custom role to a team). Also uses the
  getOrganizationMembers data source to list current organization members.

config:
  organizationName:
    type: string
    default: service-provider-test-org
  digits:
    type: string
  # The Pulumi Cloud user to add to the organization. Must already have an
  # account.
  memberUsername:
    type: string
    default: service-provider-example-user

resources:
  # A custom organization-level role that grants stack read access.
  readOnlyRole:
    type: pulumiservice:OrganizationRole
    properties:
      organizationName: ${organizationName}
      name: yaml-rbac-read-only-${digits}
      description: Read-only access to stacks, created by the yaml-rbac example.
      permissions:
        __type: PermissionDescriptorAllow
        permissions:
          - stack:read

  # A team that will receive the custom role.
  rbacTeam:
    type: pulumiservice:Team
    properties:
      organizationName: ${organizationName}
      name: yaml-rbac-team-${digits}
      teamType: pulumi
      displayName: yaml-rbac team (${digits})
      description: Team created by the yaml-rbac example.

  # Assign the custom role to the team. The provider auto-enables the
  # team custom-roles feature on first use.
  rbacTeamRoleBinding:
    type: pulumiservice:TeamRoleAssignment
    properties:
      organizationName: ${organizationName}
      teamName: ${rbacTeam.name}
      roleId: ${readOnlyRole.roleId}

  # Add a user to the organization and assign them the custom role directly.
  rbacMember:
    type: pulumiservice:OrganizationMember
    properties:
      organizationName: ${organizationName}
      username: ${memberUsername}
      roleId: ${readOnlyRole.roleId}

variables:
  # Data source: list every member of the organization.
  currentMembers:
    fn::invoke:
      function: pulumiservice:getOrganizationMembers
      arguments:
        organizationName: ${organizationName}
  # Data source: discover the permission-scope catalogue. Customers use this
  # to find the valid scope names to put in OrganizationRole.permissions.
  availableScopes:
    fn::invoke:
      function: pulumiservice:getOrganizationRoleScopes
      arguments:
        organizationName: ${organizationName}

outputs:
  roleId: ${readOnlyRole.roleId}
  roleVersion: ${readOnlyRole.version}
  assignedRoleName: ${rbacTeamRoleBinding.roleName}
  memberRoleName: ${rbacMember.roleName}
  firstMember: ${currentMembers.members[0].username}
  firstScope: ${availableScopes.scopes[0].name}
