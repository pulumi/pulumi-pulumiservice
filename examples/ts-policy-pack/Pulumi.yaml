name: policy-pack-example
runtime: nodejs
description: Publish a Policy Pack via the Pulumi Service provider.

config:
  organizationName:
    type: string
    description: Pulumi Cloud organization to publish the policy pack to.
    default: service-provider-test-org
  digits:
    type: string
    description: Random suffix used to keep resource names unique across runs.
  versionTag:
    type: string
    description: Policy pack version tag. Cloud tombstones tags on delete, so re-runs must bump it (or use a fresh `digits`).
    default: "1.0.0"
