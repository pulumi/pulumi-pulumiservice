name: yaml-ado-integration
runtime: yaml
description: Example of provisioning an Azure DevOps integration via Pulumi YAML
config:
  organizationName:
    type: string
    default: service-provider-test-org
  adoOrganizationName:
    type: string
  projectId:
    type: string
resources:
  adoIntegration:
    type: pulumiservice:AzureDevOpsIntegration
    properties:
      organization: ${organizationName}
      adoOrganizationName: ${adoOrganizationName}
      projectId: ${projectId}
      disablePRComments: false
      disableNeoSummaries: false
      disableDetailedDiff: false
outputs:
  integrationId: ${adoIntegration.integrationId}
  valid: ${adoIntegration.valid}
  projectName: ${adoIntegration.projectName}
