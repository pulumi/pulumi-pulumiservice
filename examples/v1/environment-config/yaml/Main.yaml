# Auxiliary configuration on an existing ESC environment:
#   - EnvironmentDraft opens a change-request session for an environment.
#   - EnvironmentSettings configures per-environment guardrails (deletion
#     protection, etc.).
# Both target an environment that already exists at the given path; this
# example is preview-only because we don't create the environment here.
resources:
  draft:
    type: pulumiservice:v1/esc:EnvironmentDraft
    properties:
      orgName: ${organizationName}
      projectName: ${projectName}
      envName: ${envName}
  settings:
    type: pulumiservice:v1/esc:EnvironmentSettings
    properties:
      orgName: ${organizationName}
      projectName: ${projectName}
      envName: ${envName}
      deletionProtected: true
outputs:
  draftId: ${draft.changeRequestId}
  protected: ${settings.deletionProtected}
