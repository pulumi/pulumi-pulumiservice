# Tagging a specific revision requires the env to have a definition
# pushed (revision 1+). Newly-created envs created via the v1
# Environment resource are empty (no definition) so this case is
# preview-only — the program compiles and resolves the v1 type token,
# but a real Up would 404 on the revision.
resources:
  environment:
    type: pulumiservice:v1/esc:Environment
    properties:
      orgName: ${organizationName}
      project: ${projectName}
      name: ${envName}
  revisionTag:
    type: pulumiservice:v1/esc:RevisionTag
    properties:
      orgName: ${organizationName}
      projectName: ${projectName}
      envName: ${envName}
      name: ${tagName}
      revision: ${tagRevision}
    options:
      dependsOn:
        - ${environment}
outputs:
  tagName: ${revisionTag.name}
